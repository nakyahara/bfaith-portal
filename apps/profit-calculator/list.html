<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リサーチ・見積もり — リサーチ仕入れツール</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif; background: #eaeded; color: #0f1111; font-size: 13px; }
    a { color: #0066c0; text-decoration: none; }

    .header { background: #232f3e; color: #fff; padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 17px; font-weight: bold; }
    .header h1 span { color: #ff9900; }
    .page-tabs { display: flex; background: #37475a; padding: 0 24px; }
    .page-tab { padding: 10px 20px; color: #ccc; font-size: 13px; font-weight: bold; text-decoration: none; border-bottom: 3px solid transparent; }
    .page-tab:hover { color: #fff; text-decoration: none; }
    .page-tab.active { color: #fff; border-bottom-color: #ff9900; }
    .container { max-width: 1500px; margin: 16px auto; padding: 0 16px; }

    .filter-bar { background: #fff; border: 1px solid #d5d9d9; border-radius: 6px; padding: 10px 16px; margin-bottom: 12px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .filter-bar select, .filter-bar input { padding: 5px 8px; border: 1px solid #888; border-radius: 4px; font-size: 13px; }
    .filter-bar input { width: 200px; }
    .filter-bar .count { margin-left: auto; font-size: 12px; color: #565959; }
    .btn { padding: 6px 14px; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; border: 1px solid; }
    .btn-sm { padding: 3px 10px; font-size: 11px; }
    .btn-primary { background: #f0c14b; border-color: #a88734; color: #0f1111; }
    .btn-primary:hover { background: #e7b83c; }
    .btn-success { background: #f0fff0; border-color: #007600; color: #007600; }
    .btn-quote { background: #fff8e6; border-color: #b8860b; color: #856404; }
    .btn-answer { background: #e6f3ff; border-color: #0066c0; color: #1864ab; }
    .btn-danger { background: #fff0f0; border-color: #b12704; color: #b12704; }

    .data-table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #d5d9d9; border-radius: 6px; overflow: hidden; }
    .data-table th { background: #f7f8f8; padding: 8px 10px; text-align: left; font-size: 11px; color: #565959; border-bottom: 2px solid #d5d9d9; white-space: nowrap; }
    .data-table td { padding: 7px 10px; border-bottom: 1px solid #eee; vertical-align: middle; }
    .data-table tr.data-row { cursor: pointer; }
    .data-table tr.data-row:hover { background: #fafafa; }
    .data-table tr.data-row.expanded { background: #f0f6ff; }
    .data-table .thumb { width: 40px; height: 40px; object-fit: contain; border-radius: 3px; }
    .data-table .asin-link { font-weight: bold; font-size: 12px; }
    .data-table .product-name-cell { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
    .data-table .num { text-align: right; font-variant-numeric: tabular-nums; }
    .data-table .positive { color: #007600; }
    .data-table .negative { color: #b12704; }

    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; white-space: nowrap; }
    .status-badge.リサーチ { background: #e3e6e8; color: #444; }
    .status-badge.見積もり依頼予定 { background: #fce4ec; color: #ad1457; }
    .status-badge.見積もり依頼中 { background: #fff3cd; color: #856404; }
    .status-badge.回答済 { background: #ffd8a8; color: #a55000; }
    .status-badge.商品登録済 { background: #b2f2bb; color: #087f23; }
    .status-badge.判断中 { background: #d0ebff; color: #1864ab; }
    .status-badge.却下 { background: #ffe0e0; color: #b12704; }
    .status-badge.発注済 { background: #e8d5f5; color: #6741d9; }

    .judgment-sm { display: inline-block; width: 22px; height: 22px; line-height: 22px; border-radius: 50%; font-size: 13px; font-weight: bold; text-align: center; color: #fff; }
    .judgment-sm.◎ { background: #007600; }
    .judgment-sm.○ { background: #0066c0; }
    .judgment-sm.△ { background: #c7511f; }
    .judgment-sm.× { background: #b12704; }

    /* 展開パネル */
    .detail-row { display: none; }
    .detail-row.open { display: table-row; }
    .detail-panel { padding: 16px 20px; background: #fafcff; border-bottom: 2px solid #d5d9d9; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .detail-section { background: #fff; border: 1px solid #d5d9d9; border-radius: 6px; padding: 12px 16px; }
    .detail-section h3 { font-size: 13px; font-weight: bold; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 2px solid #ff9900; }
    .detail-form { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
    .detail-form.single-col { grid-template-columns: 1fr; }
    .detail-field { display: flex; flex-direction: column; gap: 2px; }
    .detail-field label { font-size: 11px; font-weight: bold; color: #565959; }
    .detail-field input, .detail-field select, .detail-field textarea { padding: 5px 8px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px; }
    .detail-field input:focus, .detail-field select:focus, .detail-field textarea:focus { border-color: #e77600; outline: none; box-shadow: 0 0 3px #e77600; }
    .detail-field textarea { resize: vertical; min-height: 50px; }
    .detail-field .readonly { background: #f7f8f8; color: #565959; }
    .detail-field .info-val { font-size: 13px; padding: 4px 0; }
    .detail-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
    .detail-actions .saved-msg { color: #067D62; font-size: 12px; font-weight: bold; display: none; }

    /* 見積もり依頼ハイライト */
    .quote-highlight { background: #fffbeb; border-color: #f0c14b; }
    .answer-highlight { background: #f0f8ff; border-color: #0066c0; }

    /* 商品情報ヘッダー */
    .product-header { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid #eee; }
    .product-header img { width: 70px; height: 70px; object-fit: contain; border: 1px solid #d5d9d9; border-radius: 4px; }
    .product-header-info { flex: 1; }
    .product-header-info .ph-name { font-size: 14px; font-weight: bold; line-height: 1.4; margin-bottom: 4px; }
    .product-header-info .ph-meta { font-size: 12px; color: #565959; display: flex; gap: 16px; flex-wrap: wrap; }
    .product-header-info .ph-meta span { white-space: nowrap; }
    .product-header-info .ph-meta b { color: #0f1111; }

    .empty-msg { text-align: center; padding: 40px; color: #888; font-size: 14px; }
    .toast { position: fixed; top: 20px; right: 20px; background: #067D62; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; display: none; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .actions-cell { display: flex; gap: 4px; flex-wrap: wrap; }
    .expand-icon { font-size: 10px; color: #888; transition: transform 0.2s; display: inline-block; width: 16px; text-align: center; }
    .expanded .expand-icon { transform: rotate(90deg); }

    /* 新規登録モーダル */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; justify-content: center; align-items: flex-start; padding-top: 40px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 8px; width: 700px; max-width: 95vw; max-height: 85vh; overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .modal-header { background: #232f3e; color: #fff; padding: 12px 20px; border-radius: 8px 8px 0 0; display: flex; justify-content: space-between; align-items: center; }
    .modal-header h2 { font-size: 15px; }
    .modal-close { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; padding: 0 4px; }
    .modal-body { padding: 14px 20px; }
    .modal-form { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px 12px; }
    .modal-form.col2 { grid-template-columns: 1fr 1fr; }
    .modal-form.full { grid-template-columns: 1fr; }
    .modal-field { display: flex; flex-direction: column; gap: 2px; }
    .modal-field.span2 { grid-column: span 2; }
    .modal-field.span3 { grid-column: span 3; }
    .modal-field label { font-size: 11px; font-weight: bold; color: #565959; }
    .modal-field input, .modal-field select, .modal-field textarea { padding: 4px 7px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px; }
    .modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus { border-color: #e77600; outline: none; box-shadow: 0 0 3px #e77600; }
    .modal-field textarea { resize: vertical; min-height: 40px; }
    .modal-field .hint { font-size: 10px; color: #888; }
    .modal-section { font-size: 12px; font-weight: bold; margin-top: 6px; padding-top: 6px; border-top: 1px solid #eee; grid-column: 1 / -1; color: #232f3e; }
    .modal-footer { padding: 12px 20px; border-top: 1px solid #eee; display: flex; gap: 10px; justify-content: flex-end; }
    .btn-add { background: #ff9900; border-color: #c77600; color: #0f1111; font-size: 14px; padding: 8px 24px; }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>💰</span> リサーチ仕入れツール</h1>
    <a href="/" style="color:#ddd; font-size:13px; text-decoration:none;">← ポータルに戻る</a>
  </div>
  <div class="page-tabs">
    <a href="./research" class="page-tab active">リサーチ・見積もり</a>
    <a href="./" class="page-tab">商品計算</a>
    <a href="./products" class="page-tab">NE商品登録</a>
    <a href="./amazon" class="page-tab">Amazon出品</a>
    <a href="./amazon-manual" class="page-tab">Amazon出品手動</a>
    <a href="./price-revision" class="page-tab">価格改定</a>
    <a href="./suppliers" class="page-tab" style="margin-left:auto;">仕入れ先管理</a>
    <a href="./shipping" class="page-tab">送料管理</a>
    <a href="./settings" class="page-tab">設定</a>
  </div>

  <div class="container">
    <div class="filter-bar">
      <button class="btn btn-add" onclick="openNewModal()">+ 新規登録</button>
      <select id="statusFilter" onchange="loadData()">
        <option value="">全ステータス</option>
        <option value="リサーチ">リサーチ</option>
        <option value="見積もり依頼予定">見積もり依頼予定</option>
        <option value="見積もり依頼中">見積もり依頼中</option>
        <option value="回答済">回答済</option>
        <option value="商品登録済">商品登録済</option>
        <option value="判断中">判断中</option>
        <option value="却下">却下</option>
      </select>
      <input type="text" id="searchInput" placeholder="ASIN・商品名・仕入れ先で検索" oninput="debounceLoad()">
      <span class="count" id="countDisplay">-</span>
    </div>
    <div id="tableContainer"></div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- 新規登録モーダル -->
  <div class="modal-overlay" id="newModal" onclick="if(event.target===this)closeNewModal()">
    <div class="modal">
      <div class="modal-header">
        <h2>リサーチ新規登録</h2>
        <button class="modal-close" onclick="closeNewModal()">&times;</button>
      </div>
      <div class="modal-body">
        <!-- ASIN + 商品名 -->
        <div class="modal-form">
          <div class="modal-field">
            <label>ASIN</label>
            <div style="display:flex; gap:4px;">
              <input type="text" id="new-asin" placeholder="B000FQK36A" maxlength="10" style="flex:1;">
              <button class="btn btn-primary btn-sm" onclick="fetchProductForNew()" id="btn-asin-search">検索</button>
            </div>
            <span class="hint" id="asin-search-status">Enter or 検索で自動取得</span>
          </div>
          <div class="modal-field span2">
            <label>商品名</label>
            <input type="text" id="new-product-name" placeholder="ASIN検索で自動取得 or 手入力">
          </div>

          <!-- 仕入れ先 -->
          <div class="modal-section">仕入れ先</div>
          <div class="modal-field span2">
            <label>仕入れ先</label>
            <select id="new-supplier-code" onchange="onNewSupplierChange()">
              <option value="">選択してください</option>
            </select>
          </div>
          <div class="modal-field">
            <label>メーカー/問屋名</label>
            <input type="text" id="new-supplier-name" placeholder="自動入力 or 手入力">
          </div>
          <div class="modal-field">
            <label>型番</label>
            <input type="text" id="new-part-number" placeholder="自動取得">
          </div>
          <div class="modal-field">
            <label>JAN</label>
            <input type="text" id="new-jan" placeholder="自動取得">
          </div>
          <div class="modal-field">
            <label>内容量</label>
            <input type="text" id="new-quantity">
          </div>

          <!-- 見積もり -->
          <div class="modal-section">見積もり</div>
          <div class="modal-field">
            <label>メーカーURL</label>
            <input type="url" id="new-maker-url" placeholder="https://...">
          </div>
          <div class="modal-field">
            <label>見積書URL</label>
            <input type="url" id="new-quote-url" placeholder="https://...">
          </div>
          <div class="modal-field">
            <label>賞味期限</label>
            <input type="text" id="new-expiry" placeholder="例: 12ヶ月">
          </div>
          <div class="modal-field span3">
            <label>依頼メモ</label>
            <textarea id="new-quote-note" rows="2" placeholder="例: アメージングクラフト様に100個ロットで打診"></textarea>
          </div>
          <div class="modal-field span3">
            <label>コメント</label>
            <input type="text" id="new-comment" placeholder="備考">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" style="background:#fff;" onclick="closeNewModal()">キャンセル</button>
        <select id="new-status" style="padding:6px 10px; border:1px solid #aaa; border-radius:4px; font-size:13px;">
          <option value="リサーチ">リサーチ</option>
          <option value="見積もり依頼予定">見積もり依頼予定</option>
          <option value="見積もり依頼中" selected>見積もり依頼中</option>
        </select>
        <button class="btn btn-add" onclick="submitNew()">登録</button>
      </div>
    </div>
  </div>

  <!-- 仕入れ先管理モーダル -->
  <div class="modal-overlay" id="supplierModal" onclick="if(event.target===this)closeSupplierModal()">
    <div class="modal">
      <div class="modal-header">
        <h2>仕入れ先マスタ管理</h2>
        <button class="modal-close" onclick="closeSupplierModal()">&times;</button>
      </div>
      <div class="modal-body">
        <!-- 新規追加フォーム -->
        <div style="background:#f7f8f8; border:1px solid #d5d9d9; border-radius:6px; padding:12px 16px; margin-bottom:14px;">
          <div style="font-size:13px; font-weight:bold; margin-bottom:8px;">新しい仕入れ先を追加</div>
          <div style="display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap;">
            <div class="modal-field" style="width:100px;">
              <label>コード</label>
              <input type="text" id="sup-new-code" placeholder="0048" maxlength="4">
            </div>
            <div class="modal-field" style="flex:1; min-width:200px;">
              <label>仕入れ先名</label>
              <input type="text" id="sup-new-name" placeholder="例: 新規メーカー様">
            </div>
            <button class="btn btn-primary" onclick="addNewSupplier()">追加</button>
          </div>
        </div>
        <!-- 検索 -->
        <div style="margin-bottom:10px;">
          <input type="text" id="sup-search" placeholder="コード・名前で検索" oninput="filterSupplierTable()" style="padding:5px 8px; border:1px solid #aaa; border-radius:4px; font-size:13px; width:250px;">
          <span id="sup-count" style="margin-left:8px; font-size:12px; color:#565959;"></span>
        </div>
        <!-- 一覧テーブル -->
        <div style="max-height:400px; overflow-y:auto; border:1px solid #d5d9d9; border-radius:4px;">
          <table class="data-table" style="margin:0; border:none;">
            <thead><tr><th style="width:80px;">コード</th><th>仕入れ先名</th><th style="width:60px;">操作</th></tr></thead>
            <tbody id="sup-table-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    let debounceTimer = null;
    let allData = [];
    let expandedId = null;
    const STATUSES = ['リサーチ', '見積もり依頼予定', '見積もり依頼中', '回答済', '判断中', '却下'];
    let supplierList = [];

    document.addEventListener('DOMContentLoaded', () => {
      loadData();
      loadSupplierList();
    });

    function debounceLoad() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(loadData, 300);
    }

    async function loadData() {
      const status = document.getElementById('statusFilter').value;
      const search = document.getElementById('searchInput').value.trim();
      const params = new URLSearchParams();
      if (status) params.set('status', status);
      if (search) params.set('search', search);

      try {
        const res = await fetch(`./api/research?${params}`);
        allData = await res.json();
        document.getElementById('countDisplay').textContent = `${allData.length}件`;
        renderTable(allData);
      } catch (err) {
        document.getElementById('tableContainer').innerHTML = `<div class="empty-msg">エラー: ${err.message}</div>`;
      }
    }

    function renderTable(data) {
      if (data.length === 0) {
        document.getElementById('tableContainer').innerHTML = '<div class="empty-msg">データがありません</div>';
        return;
      }

      let html = `<table class="data-table">
        <thead><tr>
          <th style="width:20px;"></th><th></th><th>ASIN</th><th>商品名</th><th>仕入れ先</th>
          <th>卸価格(税込)</th><th>ロット</th>
          <th>ステータス</th><th>登録日</th><th>操作</th>
        </tr></thead>
        <tbody>`;

      for (const r of data) {
        const isExp = expandedId === r.id;
        html += `<tr class="data-row ${isExp ? 'expanded' : ''}" onclick="toggleRow(${r.id}, event)">
          <td><span class="expand-icon">${isExp ? '▼' : '▶'}</span></td>
          <td>${r.image_url ? `<img class="thumb" src="${esc(r.image_url)}">` : ''}</td>
          <td><a class="asin-link" href="https://www.amazon.co.jp/dp/${r.asin}" target="_blank" onclick="event.stopPropagation()">${r.asin}</a></td>
          <td class="product-name-cell" title="${esc(r.product_name || '')}">${esc(r.product_name || '-')}</td>
          <td>${esc(r.supplier_name || '-')}</td>
          <td class="num">${r.wholesale_price_with_tax ? '¥'+Number(r.wholesale_price_with_tax).toLocaleString() : '-'}</td>
          <td class="num">${r.lot || '-'}</td>
          <td><span class="status-badge ${r.status || ''}">${r.status || '-'}</span></td>
          <td style="font-size:11px;">${r.created_at ? r.created_at.slice(0,10) : '-'}</td>
          <td onclick="event.stopPropagation()"><div class="actions-cell">
            ${r.status !== '却下' && r.status !== '発注済' ? `<select class="btn-sm" onchange="changeStatus(${r.id}, this.value)" style="font-size:11px;">
              <option value="">変更</option>
              ${STATUSES.filter(s => s !== r.status).map(s => `<option value="${s}">${s}</option>`).join('')}
            </select>` : ''}
            ${r.asin && r.asin !== 'UNKNOWN' ? `<button class="btn btn-sm" style="background:#fff8e6; border-color:#b8860b; color:#856404; font-size:10px;" onclick="goToCalc('${r.asin}')">計算</button>` : ''}
          </div></td>
        </tr>`;

        // 展開パネル
        html += `<tr class="detail-row ${isExp ? 'open' : ''}" id="detail-${r.id}">
          <td colspan="10">
            <div class="detail-panel">
              ${renderDetailPanel(r)}
            </div>
          </td>
        </tr>`;
      }

      html += '</tbody></table>';
      document.getElementById('tableContainer').innerHTML = html;
    }

    function renderDetailPanel(r) {
      const today = new Date().toISOString().slice(0, 10);
      return `
        <!-- 商品ヘッダー -->
        <div class="product-header">
          ${r.image_url ? `<img src="${esc(r.image_url)}" alt="">` : ''}
          <div class="product-header-info">
            <div class="ph-name"><a href="https://www.amazon.co.jp/dp/${r.asin}" target="_blank">${esc(r.product_name || r.asin)}</a></div>
            <div class="ph-meta">
              <span><b>ASIN:</b> ${r.asin}</span>
              <span><b>JAN:</b> ${r.jan || '-'}</span>
              <span><b>型番:</b> ${r.part_number || '-'}</span>
              <span><b>カテゴリ:</b> ${r.category || '-'}</span>
              <span><b>ランキング:</b> ${r.sales_rank && r.sales_rank !== '-' ? '#'+Number(r.sales_rank).toLocaleString() : '-'}</span>
              <span><b>出品者:</b> ${r.offer_count || '-'}</span>
            </div>
          </div>
        </div>

        <div class="detail-grid">
          <!-- 左: 見積もり依頼セクション -->
          <div class="detail-section ${r.status === 'リサーチ' || r.status === '見積もり依頼中' ? 'quote-highlight' : ''}">
            <h3>見積もり依頼</h3>
            <div class="detail-form">
              <div class="detail-field">
                <label>仕入れ先</label>
                <select id="d-supplier-code-${r.id}" onchange="onDetailSupplierChange(${r.id})">
                  <option value="">選択してください</option>
                  ${supplierList.map(s => `<option value="${s.code}" data-name="${esc(s.name)}" ${s.code === r.supplier_code ? 'selected' : ''}>${s.code} - ${esc(s.name)}</option>`).join('')}
                </select>
              </div>
              <div class="detail-field">
                <label>メーカー/問屋名</label>
                <input type="text" id="d-supplier-name-${r.id}" value="${esc(r.supplier_name || '')}" placeholder="仕入れ先選択で自動入力 or 手入力">
              </div>
              <div class="detail-field">
                <label>型番</label>
                <input type="text" id="d-part-number-${r.id}" value="${esc(r.part_number || '')}">
              </div>
              <div class="detail-field">
                <label>JAN</label>
                <input type="text" id="d-jan-${r.id}" value="${esc(r.jan || '')}">
              </div>
              <div class="detail-field">
                <label>内容量</label>
                <input type="text" id="d-quantity-${r.id}" value="${esc(r.quantity || '')}">
              </div>
              <div class="detail-field">
                <label>賞味期限</label>
                <input type="text" id="d-expiry-${r.id}" value="${esc(r.expiry_date || '')}" placeholder="例: 12ヶ月">
              </div>
              <div class="detail-field">
                <label>メーカーURL</label>
                <input type="url" id="d-maker-url-${r.id}" value="${esc(r.maker_url || '')}">
              </div>
              <div class="detail-field">
                <label>見積書URL</label>
                <input type="url" id="d-quote-url-${r.id}" value="${esc(r.quote_url || '')}">
              </div>
            </div>
            <div class="detail-form single-col" style="margin-top: 8px;">
              <div class="detail-field">
                <label>見積もり依頼メモ（依頼先・内容など）</label>
                <textarea id="d-quote-note-${r.id}" placeholder="例: アメージングクラフト様に見積もり依頼。100個ロットで打診。">${esc(r.quote_note || '')}</textarea>
              </div>
              <div class="detail-field">
                <label>依頼日</label>
                <input type="date" id="d-quote-requested-${r.id}" value="${r.quote_requested_at || ''}">
              </div>
            </div>
            <div class="detail-actions">
              <button class="btn btn-quote" onclick="requestQuote(${r.id})">
                見積もり依頼として登録
              </button>
              <span class="saved-msg" id="d-saved-quote-${r.id}">保存しました</span>
              ${r.quote_requested_at ? `<span style="font-size:11px; color:#856404;">依頼済: ${r.quote_requested_at}</span>` : ''}
            </div>
          </div>

          <!-- 右: 回答・卸価格入力セクション -->
          <div class="detail-section ${r.status === '見積もり依頼中' || r.status === '回答済' ? 'answer-highlight' : ''}">
            <h3>見積もり回答・卸価格登録</h3>
            <div class="detail-form">
              <div class="detail-field">
                <label>卸価格（税抜）</label>
                <input type="number" id="d-wholesale-${r.id}" value="${r.wholesale_price || ''}" min="0" oninput="recalcDetail(${r.id})">
              </div>
              <div class="detail-field">
                <label>税率</label>
                <select id="d-taxrate-${r.id}" onchange="recalcDetail(${r.id})">
                  <option value="10" ${(r.tax_rate == 10 || !r.tax_rate) ? 'selected' : ''}>10%</option>
                  <option value="8" ${r.tax_rate == 8 ? 'selected' : ''}>8%</option>
                </select>
              </div>
              <div class="detail-field">
                <label>卸価格（税込）</label>
                <input type="text" id="d-wholesale-tax-${r.id}" value="${r.wholesale_price_with_tax || ''}" class="readonly" readonly>
              </div>
              <div class="detail-field">
                <label>ロット</label>
                <input type="number" id="d-lot-${r.id}" value="${r.lot || 1}" min="1">
              </div>
              <div class="detail-field">
                <label>回答日</label>
                <input type="date" id="d-quote-responded-${r.id}" value="${r.quote_responded_at || ''}">
              </div>
            </div>

            <div class="detail-form single-col" style="margin-top: 8px;">
              <div class="detail-field">
                <label>コメント</label>
                <textarea id="d-comment-${r.id}" placeholder="備考">${esc(r.comment || '')}</textarea>
              </div>
            </div>
            <div class="detail-actions">
              <button class="btn btn-answer" onclick="saveAnswer(${r.id})">
                卸価格・回答を保存
              </button>
              <button class="btn btn-primary" onclick="saveAllDetail(${r.id})">
                全項目を保存
              </button>
              <button class="btn btn-primary" style="background:#d9534f; border-color:#c9302c; color:#fff; padding:6px 16px; font-size:13px;" onclick="goToCalc(${r.id})">商品計算へ →</button>
              <span class="saved-msg" id="d-saved-answer-${r.id}">保存しました</span>
              ${r.quote_responded_at ? `<span style="font-size:11px; color:#1864ab;">回答日: ${r.quote_responded_at}</span>` : ''}
            </div>
          </div>
        </div>
      `;
    }

    // === 展開パネル内の仕入れ先連動 ===
    function onDetailSupplierChange(id) {
      const sel = document.getElementById(`d-supplier-code-${id}`);
      const opt = sel.options[sel.selectedIndex];
      if (opt && opt.dataset.name) {
        document.getElementById(`d-supplier-name-${id}`).value = opt.dataset.name;
      }
    }

    // === 行展開 ===
    function toggleRow(id, event) {
      if (expandedId === id) {
        expandedId = null;
      } else {
        expandedId = id;
      }
      renderTable(allData);
    }

    // === 見積もり依頼登録 ===
    async function requestQuote(id) {
      const today = new Date().toISOString().slice(0, 10);
      const data = {
        supplier_code: document.getElementById(`d-supplier-code-${id}`).value,
        supplier_name: document.getElementById(`d-supplier-name-${id}`).value,
        part_number: document.getElementById(`d-part-number-${id}`).value,
        jan: document.getElementById(`d-jan-${id}`).value,
        quantity: document.getElementById(`d-quantity-${id}`).value,
        expiry_date: document.getElementById(`d-expiry-${id}`).value,
        maker_url: document.getElementById(`d-maker-url-${id}`).value,
        quote_url: document.getElementById(`d-quote-url-${id}`).value,
        quote_note: document.getElementById(`d-quote-note-${id}`).value,
        quote_requested_at: document.getElementById(`d-quote-requested-${id}`).value || today,
        status: '見積もり依頼中',
      };

      try {
        const res = await fetch(`./api/research/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        if (res.ok) {
          const updated = await res.json();
          updateLocalData(id, updated);
          showSavedMsg(`d-saved-quote-${id}`);
          showToast(`見積もり依頼として登録しました`);
        }
      } catch (err) { showToast('エラー: ' + err.message); }
    }

    // === 卸価格・回答保存 ===
    async function saveAnswer(id) {
      const today = new Date().toISOString().slice(0, 10);
      const wholesale = parseInt(document.getElementById(`d-wholesale-${id}`).value) || 0;
      const taxRate = parseInt(document.getElementById(`d-taxrate-${id}`).value) || 10;
      const withTax = Math.ceil(wholesale * (1 + taxRate / 100));

      const data = {
        wholesale_price: wholesale,
        tax_rate: taxRate,
        wholesale_price_with_tax: withTax,
        lot: parseInt(document.getElementById(`d-lot-${id}`).value) || 1,
        comment: document.getElementById(`d-comment-${id}`).value,
        quote_responded_at: document.getElementById(`d-quote-responded-${id}`).value || today,
        status: '回答済',
      };

      try {
        const res = await fetch(`./api/research/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        if (res.ok) {
          const updated = await res.json();
          updateLocalData(id, updated);
          showSavedMsg(`d-saved-answer-${id}`);
          showToast(`卸価格を登録し、ステータスを「回答済」に変更しました`);
        }
      } catch (err) { showToast('エラー: ' + err.message); }
    }

    // === 全項目保存 ===
    async function saveAllDetail(id) {
      const wholesale = parseInt(document.getElementById(`d-wholesale-${id}`).value) || 0;
      const taxRate = parseInt(document.getElementById(`d-taxrate-${id}`).value) || 10;
      const withTax = Math.ceil(wholesale * (1 + taxRate / 100));

      const data = {
        supplier_code: document.getElementById(`d-supplier-code-${id}`).value,
        supplier_name: document.getElementById(`d-supplier-name-${id}`).value,
        part_number: document.getElementById(`d-part-number-${id}`).value,
        jan: document.getElementById(`d-jan-${id}`).value,
        quantity: document.getElementById(`d-quantity-${id}`).value,
        expiry_date: document.getElementById(`d-expiry-${id}`).value,
        maker_url: document.getElementById(`d-maker-url-${id}`).value,
        quote_url: document.getElementById(`d-quote-url-${id}`).value,
        quote_note: document.getElementById(`d-quote-note-${id}`).value,
        quote_requested_at: document.getElementById(`d-quote-requested-${id}`).value,
        wholesale_price: wholesale,
        tax_rate: taxRate,
        wholesale_price_with_tax: withTax,
        lot: parseInt(document.getElementById(`d-lot-${id}`).value) || 1,
        comment: document.getElementById(`d-comment-${id}`).value,
        quote_responded_at: document.getElementById(`d-quote-responded-${id}`).value,
      };

      try {
        const res = await fetch(`./api/research/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        if (res.ok) {
          const updated = await res.json();
          updateLocalData(id, updated);
          showSavedMsg(`d-saved-answer-${id}`);
          showToast('全項目を保存しました');
        }
      } catch (err) { showToast('エラー: ' + err.message); }
    }

    // === 商品計算へ遷移（リサーチデータを引き継ぎ） ===
    function goToCalc(id) {
      const r = allData.find(d => d.id === id);
      if (!r) return;
      const params = new URLSearchParams();
      params.set('research_id', id);
      if (r.asin && r.asin !== 'UNKNOWN') params.set('asin', r.asin);
      if (r.wholesale_price) params.set('wholesale', r.wholesale_price);
      if (r.tax_rate) params.set('tax', String(r.tax_rate).replace('%', ''));
      if (r.lot) params.set('lot', r.lot);
      if (r.supplier_code) params.set('supplier', r.supplier_code);
      window.location.href = `./?${params.toString()}`;
    }

    // === 詳細パネル内の即時再計算（税込のみ） ===
    function recalcDetail(id) {
      const wholesale = parseInt(document.getElementById(`d-wholesale-${id}`).value) || 0;
      const taxRate = parseInt(document.getElementById(`d-taxrate-${id}`).value) || 10;
      const withTax = Math.ceil(wholesale * (1 + taxRate / 100));
      document.getElementById(`d-wholesale-tax-${id}`).value = withTax;
    }

    // === ローカルデータ更新 ===
    function updateLocalData(id, updated) {
      const idx = allData.findIndex(r => r.id === id);
      if (idx >= 0) allData[idx] = updated;
      renderTable(allData);
    }

    // === ステータス変更 ===
    async function changeStatus(id, status) {
      if (!status) return;
      const res = await fetch(`./api/research/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status }),
      });
      if (res.ok) {
        const updated = await res.json();
        updateLocalData(id, updated);
        showToast(`ステータスを「${status}」に変更`);
      }
    }


    // === 仕入れ先マスタ読み込み ===
    async function loadSupplierList() {
      try {
        const res = await fetch('./api/suppliers');
        supplierList = await res.json();
        populateSupplierDropdown('new-supplier-code');
      } catch (e) { console.error('仕入れ先読み込みエラー:', e); }
    }

    function populateSupplierDropdown(selectId) {
      const sel = document.getElementById(selectId);
      if (!sel) return;
      const current = sel.value;
      sel.innerHTML = '<option value="">選択してください</option>';
      supplierList.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.code;
        opt.textContent = `${s.code} - ${s.name}`;
        opt.dataset.name = s.name;
        sel.appendChild(opt);
      });
      if (current) sel.value = current;
    }

    function onNewSupplierChange() {
      const sel = document.getElementById('new-supplier-code');
      const opt = sel.options[sel.selectedIndex];
      if (opt && opt.dataset.name) {
        document.getElementById('new-supplier-name').value = opt.dataset.name;
      }
    }

    // === 仕入れ先管理モーダル ===
    function openSupplierModal() {
      document.getElementById('supplierModal').classList.add('open');
      renderSupplierTable();
    }
    function closeSupplierModal() {
      document.getElementById('supplierModal').classList.remove('open');
      // ドロップダウンを最新に更新
      populateSupplierDropdown('new-supplier-code');
      // 展開パネルがあれば再描画
      if (expandedId) renderTable(allData);
    }

    function renderSupplierTable(filter) {
      const tbody = document.getElementById('sup-table-body');
      let list = supplierList;
      if (filter) {
        const q = filter.toLowerCase();
        list = list.filter(s => s.code.includes(q) || s.name.toLowerCase().includes(q));
      }
      document.getElementById('sup-count').textContent = `${list.length}件`;
      tbody.innerHTML = list.map(s => `<tr>
        <td style="font-weight:bold;">${esc(s.code)}</td>
        <td>${esc(s.name)}</td>
        <td><button class="btn btn-sm btn-danger" onclick="deleteSupplier('${esc(s.code)}')" style="font-size:10px;">削除</button></td>
      </tr>`).join('');
    }

    function filterSupplierTable() {
      const q = document.getElementById('sup-search').value.trim();
      renderSupplierTable(q);
    }

    async function addNewSupplier() {
      const code = document.getElementById('sup-new-code').value.trim();
      const name = document.getElementById('sup-new-name').value.trim();
      if (!code || !name) { showToast('コードと名前を入力してください'); return; }
      if (supplierList.find(s => s.code === code)) { showToast('このコードは既に登録されています'); return; }

      try {
        const res = await fetch('./api/suppliers', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, name }),
        });
        if (res.ok) {
          supplierList = await res.json();
          document.getElementById('sup-new-code').value = '';
          document.getElementById('sup-new-name').value = '';
          renderSupplierTable();
          showToast(`仕入れ先「${name}」を追加しました`);
        }
      } catch (err) { showToast('追加エラー: ' + err.message); }
    }

    async function deleteSupplier(code) {
      const s = supplierList.find(x => x.code === code);
      if (!confirm(`「${s ? s.name : code}」を削除しますか？`)) return;
      try {
        const res = await fetch('./api/suppliers', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
        });
        if (res.ok) {
          supplierList = await res.json();
          renderSupplierTable(document.getElementById('sup-search').value.trim());
          showToast('削除しました');
        } else {
          showToast('削除に失敗しました');
        }
      } catch (err) { showToast('削除エラー: ' + err.message); }
    }

    // === 新規登録モーダル ===
    function openNewModal() {
      document.getElementById('newModal').classList.add('open');
      document.getElementById('new-asin').focus();
    }
    function closeNewModal() {
      document.getElementById('newModal').classList.remove('open');
    }

    // ASIN入力でEnter → 検索
    document.addEventListener('DOMContentLoaded', () => {
      const asinEl = document.getElementById('new-asin');
      if (asinEl) {
        asinEl.addEventListener('keypress', e => {
          if (e.key === 'Enter') { e.preventDefault(); fetchProductForNew(); }
        });
      }
    });

    async function fetchProductForNew() {
      const asin = document.getElementById('new-asin').value.trim();
      if (!asin.match(/^B[0-9A-Z]{9}$/)) {
        showToast('ASINの形式が正しくありません（例: B000FQK36A）');
        return;
      }
      const btn = document.getElementById('btn-asin-search');
      const hint = document.getElementById('asin-search-status');
      btn.disabled = true;
      btn.textContent = '取得中...';
      hint.textContent = '商品情報を取得中...';
      try {
        const res = await fetch(`./api/product/${asin}`);
        if (!res.ok) {
          const err = await res.json();
          hint.textContent = '取得失敗: ' + (err.error || '不明なエラー');
          return;
        }
        const d = await res.json();
        if (d.itemName) document.getElementById('new-product-name').value = d.itemName;
        if (d.jan) document.getElementById('new-jan').value = d.jan;
        if (d.partNumber) document.getElementById('new-part-number').value = d.partNumber;
        if (d.manufacturer) document.getElementById('new-supplier-name').value = d.manufacturer;
        hint.textContent = '取得完了: ' + (d.itemName || asin);
        hint.style.color = '#007600';
        showToast('商品情報を取得しました');
      } catch (err) {
        hint.textContent = '通信エラー: ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = '検索';
      }
    }

    async function submitNew() {
      const status = document.getElementById('new-status').value;
      const asin = document.getElementById('new-asin').value.trim();
      const productName = document.getElementById('new-product-name').value.trim();
      if (!asin && !productName) {
        showToast('ASINまたは商品名を入力してください');
        return;
      }

      const today = new Date().toISOString().slice(0, 10);
      const sel = document.getElementById('new-supplier-code');
      const body = {
        asin: asin || 'UNKNOWN',
        productName: productName,
        amazonUrl: asin && asin !== 'UNKNOWN' ? `https://www.amazon.co.jp/dp/${asin}` : '',
        supplierCode: sel.value,
        supplierName: document.getElementById('new-supplier-name').value,
        partNumber: document.getElementById('new-part-number').value,
        jan: document.getElementById('new-jan').value,
        quantity: document.getElementById('new-quantity').value,
        expiryDate: document.getElementById('new-expiry').value,
        makerUrl: document.getElementById('new-maker-url').value,
        quoteUrl: document.getElementById('new-quote-url').value,
        quoteNote: document.getElementById('new-quote-note').value,
        comment: document.getElementById('new-comment').value,
        quoteRequestedAt: (status === '見積もり依頼中' || status === '見積もり依頼予定') ? today : null,
        status: status,
      };

      try {
        const res = await fetch('./api/research', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (res.ok) {
          const result = await res.json();
          closeNewModal();
          clearNewForm();
          showToast(`「${status}」として登録しました (ID: ${result.id})`);
          loadData();
        }
      } catch (err) {
        showToast('エラー: ' + err.message);
      }
    }

    function clearNewForm() {
      ['new-product-name','new-supplier-name',
       'new-part-number','new-jan','new-quantity','new-expiry',
       'new-maker-url','new-quote-url','new-quote-note','new-comment'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('new-asin').value = '';
      document.getElementById('new-supplier-code').selectedIndex = 0;
      const hint = document.getElementById('asin-search-status');
      hint.textContent = 'ASINを入力して検索 → 商品名・型番・JAN自動取得';
      hint.style.color = '';
    }

    function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function showToast(m) { const e = document.getElementById('toast'); e.textContent = m; e.style.display = 'block'; setTimeout(() => e.style.display = 'none', 3000); }
    function showSavedMsg(elId) {
      const el = document.getElementById(elId);
      if (el) { el.style.display = 'inline'; setTimeout(() => el.style.display = 'none', 2000); }
    }
  </script>
</body>
</html>
