<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>価格改定 — リサーチ仕入れツール</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif; background: #f5f5f5; color: #333; font-size: 13px; }
    a { color: #0066c0; text-decoration: none; }

    .header { background: #232f3e; color: #fff; padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 17px; font-weight: bold; }
    .header h1 span { color: #ff9900; }
    .page-tabs { display: flex; background: #37475a; padding: 0 24px; }
    .page-tab { padding: 10px 20px; color: #ccc; font-size: 13px; font-weight: bold; text-decoration: none; border-bottom: 3px solid transparent; }
    .page-tab:hover { color: #fff; }
    .page-tab.active { color: #fff; border-bottom-color: #ff9900; }

    /* ツールバー */
    .toolbar { background: #fff; border-bottom: 2px solid #e0e0e0; padding: 8px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .toolbar .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .toolbar .status-dot.active { background: #2ecc71; }
    .toolbar .status-dot.inactive { background: #ccc; }
    .toolbar .stats { font-size: 11px; color: #888; }
    .toolbar .sync-status { font-size: 11px; color: #888; margin-left: 8px; }
    .toolbar .controls { display: flex; gap: 6px; margin-left: auto; align-items: center; }
    .btn { padding: 4px 10px; border-radius: 3px; font-size: 11px; font-weight: bold; cursor: pointer; border: 1px solid #ccc; background: #f7f7f7; }
    .btn:hover { background: #eee; }

    /* 検索バー */
    .search-bar { background: #4a6fa5; padding: 8px 16px; display: flex; align-items: center; gap: 8px; }
    .search-bar input { padding: 6px 10px; border: none; border-radius: 3px; font-size: 13px; width: 300px; }
    .search-bar button { padding: 6px 16px; background: #ff9900; border: none; border-radius: 3px; color: #fff; font-weight: bold; cursor: pointer; }
    .search-bar select { padding: 5px 8px; border: none; border-radius: 3px; font-size: 12px; }

    /* 結果バー */
    .result-bar { background: #fff; border-bottom: 1px solid #ddd; padding: 6px 16px; font-size: 12px; display: flex; align-items: center; gap: 12px; }
    .result-bar .count { font-weight: bold; }
    .result-bar .badge { background: #ff9900; color: #fff; padding: 1px 8px; border-radius: 3px; font-size: 11px; }

    /* テーブルヘッダー */
    .tbl-header { display: grid; grid-template-columns: 30px 60px 1fr 130px 130px 170px 110px 130px 100px; background: #f7f7f7; border-bottom: 2px solid #ddd; font-size: 11px; font-weight: bold; color: #666; }
    .tbl-header > div { padding: 8px 6px; border-right: 1px solid #eee; text-align: center; }

    /* 商品行 */
    .product-row { display: grid; grid-template-columns: 30px 60px 1fr 130px 130px 170px 110px 130px 100px; border-bottom: 1px solid #e8e8e8; background: #fff; min-height: 90px; }
    .product-row:hover { background: #fffdf5; }
    .product-row > div { padding: 6px; border-right: 1px solid #f0f0f0; display: flex; flex-direction: column; justify-content: center; }
    .product-row > div:last-child { border-right: none; }

    /* チェックボックス */
    .col-check { align-items: center; }
    .col-check input { width: 16px; height: 16px; }

    /* 画像 */
    .col-img { align-items: center; }
    .col-img img { width: 50px; height: 50px; object-fit: contain; }

    /* 商品情報 */
    .col-info { padding: 6px 8px !important; min-width: 0; gap: 2px; }
    .col-info .pname { font-size: 12px; font-weight: bold; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .col-info .asin { font-size: 11px; color: #0066c0; }
    .col-info .sku { font-size: 10px; color: #999; }

    /* 出品価格 */
    .col-price { gap: 2px; }
    .col-price .label { font-size: 9px; color: #999; }
    .col-price input { width: 80px; padding: 3px 5px; border: 1px solid #ccc; border-radius: 3px; font-size: 13px; text-align: right; }
    .col-price input:focus { border-color: #ff9900; outline: none; }
    .col-price .sub { font-size: 10px; color: #888; }

    /* 競合・カート価格 */
    .col-comp { gap: 2px; font-size: 11px; }
    .col-comp .comp-title { font-size: 9px; color: #999; font-weight: bold; }
    .col-comp .comp-price { font-size: 14px; font-weight: bold; color: #b12704; }
    .col-comp .comp-detail { font-size: 10px; color: #666; }
    .col-comp .comp-time { font-size: 9px; color: #aaa; }

    /* モードボタン */
    .col-mode { gap: 2px; align-items: stretch; }
    .mode-btn { padding: 3px 4px; border: 1px solid #ccc; border-radius: 3px; font-size: 10px; font-weight: bold; cursor: pointer; text-align: center; background: #f7f7f7; }
    .mode-btn:hover { border-color: #ff9900; background: #fff8ee; }
    .mode-btn.active { color: #fff; border-color: transparent; }
    .mode-btn.active[data-mode="FBA最安値"] { background: #4a90d9; }
    .mode-btn.active[data-mode="最安値"] { background: #e67e22; }
    .mode-btn.active[data-mode="カート"] { background: #27ae60; }
    .mode-btn.active[data-mode="カスタム"] { background: #8e44ad; }
    .mode-btn.active[data-mode="しない"] { background: #95a5a6; }

    /* 仕入れ価格 */
    .col-cost { gap: 4px; }
    .col-cost .label { font-size: 9px; color: #999; }
    .col-cost input { width: 75px; padding: 3px 5px; border: 1px solid #ccc; border-radius: 3px; font-size: 12px; text-align: right; color: #c0392b; }
    .col-cost input:focus { border-color: #ff9900; outline: none; }

    /* ストッパー */
    .col-stopper { gap: 3px; }
    .col-stopper .s-group { display: flex; align-items: center; gap: 3px; }
    .col-stopper .s-label { font-size: 9px; color: #999; min-width: 28px; }
    .col-stopper input { width: 60px; padding: 2px 4px; border: 1px solid #ccc; border-radius: 3px; font-size: 11px; text-align: right; }
    .col-stopper input:focus { border-color: #ff9900; outline: none; }
    .col-stopper .profit { font-size: 10px; margin-top: 2px; }
    .col-stopper .profit.pos { color: #27ae60; }
    .col-stopper .profit.neg { color: #c0392b; }

    /* 手数料・粗利 */
    .col-profit { gap: 2px; text-align: center; font-size: 11px; }
    .col-profit .profit-val { font-size: 14px; font-weight: bold; }
    .col-profit .profit-val.pos { color: #27ae60; }
    .col-profit .profit-val.neg { color: #c0392b; }
    .col-profit .profit-rate { font-size: 10px; color: #888; }

    .saved-flash { animation: flashGreen 0.5s; }
    @keyframes flashGreen { 0% { background: #d4edda; } 100% { background: transparent; } }

    .empty-state { text-align: center; padding: 60px 20px; color: #999; background: #fff; font-size: 14px; }
    /* ページネーション */
    .pagination { display: flex; justify-content: center; align-items: center; gap: 4px; padding: 12px; background: #fff; border-top: 1px solid #ddd; }
    .pagination button { padding: 6px 12px; border: 1px solid #ccc; border-radius: 3px; background: #fff; cursor: pointer; font-size: 12px; }
    .pagination button:hover { background: #f0f0f0; }
    .pagination button.active { background: #4a90d9; color: #fff; border-color: #4a90d9; }
    .pagination button:disabled { opacity: 0.4; cursor: default; }
    .pagination .page-info { font-size: 12px; color: #666; margin: 0 8px; }

    .loading { text-align: center; padding: 30px; color: #888; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #ddd; border-top-color: #ff9900; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* タブ */
    .view-tabs { display: flex; gap: 0; padding: 8px 16px 0; }
    .view-tab { padding: 8px 20px; background: #e8e8e8; border: 1px solid #ddd; border-bottom: none; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 12px; font-weight: bold; color: #666; }
    .view-tab.active { background: #fff; color: #333; border-bottom: 1px solid #fff; margin-bottom: -1px; z-index: 1; }
    .tab-body { display: none; }
    .tab-body.active { display: block; }

    .history-table { width: 100%; border-collapse: collapse; font-size: 11px; background: #fff; }
    .history-table th { background: #f7f7f7; padding: 6px 8px; text-align: left; border-bottom: 2px solid #ddd; }
    .history-table td { padding: 5px 8px; border-bottom: 1px solid #eee; }
    .history-table .num { text-align: right; }
    .positive { color: #27ae60; }
    .negative { color: #c0392b; }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>B-Faith</span> リサーチ仕入れツール</h1>
    <a href="/" style="color:#ff9900;font-size:13px;">ポータルに戻る</a>
  </div>
  <div class="page-tabs">
    <a href="./research" class="page-tab">リサーチ・見積もり</a>
    <a href="./" class="page-tab">商品計算</a>
    <a href="./products" class="page-tab">NE商品登録</a>
    <a href="./amazon" class="page-tab">Amazon出品</a>
    <a href="./amazon-manual" class="page-tab">Amazon出品手動</a>
    <a href="./price-revision" class="page-tab active">価格改定</a>
    <a href="./suppliers" class="page-tab" style="margin-left:auto;">仕入れ先管理</a>
    <a href="./shipping" class="page-tab">送料管理</a>
    <a href="./settings" class="page-tab">設定</a>
  </div>

  <!-- ツールバー -->
  <div class="toolbar">
    <span class="status-dot" id="workerDot"></span>
    <span id="workerLabel" style="font-size:12px;">確認中...</span>
    <span class="stats" id="statsInfo"></span>
    <span class="sync-status" id="syncStatus"></span>
    <div class="controls">
      <button class="btn" onclick="startWorker()">開始</button>
      <button class="btn" onclick="stopWorker()">停止</button>
      <button class="btn" onclick="manualSync()">手動同期</button>
    </div>
  </div>

  <!-- 検索バー -->
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="キーワード, JAN, SKU, ASIN" oninput="filterProducts()">
    <button onclick="filterProducts()">検索</button>
    <select id="modeFilter" onchange="filterProducts()">
      <option value="">価格の自動変更 ▼</option>
      <option value="FBA最安値">FBA最安値</option>
      <option value="最安値">最安値</option>
      <option value="カート">カート</option>
      <option value="カスタム">カスタム</option>
      <option value="しない">しない</option>
      <option value="_none">未設定</option>
    </select>
    <select id="fulfillmentFilter" onchange="filterProducts()">
      <option value="">配送方法 ▼</option>
      <option value="FBA">FBA</option>
      <option value="FBM">自己発送</option>
    </select>
  </div>

  <!-- 結果バー -->
  <div class="result-bar">
    <span>検索結果：<span class="count" id="productCount">-</span></span>
    <span class="badge" id="statusBadge">出品中</span>
  </div>

  <!-- タブ -->
  <div class="view-tabs">
    <div class="view-tab active" onclick="switchTab('list')">在庫一覧</div>
    <div class="view-tab" onclick="switchTab('history')">価格変動履歴</div>
  </div>

  <!-- 在庫一覧 -->
  <div class="tab-body active" id="tab-list">
    <div class="tbl-header">
      <div></div>
      <div>画像</div>
      <div style="text-align:left;">商品名 / ASIN / SKU</div>
      <div>出品価格<br>+配送料</div>
      <div>最低価格<br>+配送料</div>
      <div>価格の自動変更</div>
      <div>仕入れ価格</div>
      <div>高値ストッパー<br>赤字ストッパー</div>
      <div>手数料<br>粗利益</div>
    </div>
    <div id="productsContainer">
      <div class="loading"><span class="spinner"></span>読み込み中...</div>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- 履歴 -->
  <div class="tab-body" id="tab-history">
    <div id="historyContainer" style="padding:8px 16px;">
      <div class="loading"><span class="spinner"></span>読み込み中...</div>
    </div>
  </div>

  <script>
    const BASE = '.';
    let allProducts = [];
    let filteredProducts = [];
    let currentPage = 1;
    const PER_PAGE = 150;

    function switchTab(tab) {
      document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-body').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      event.target.classList.add('active');
    }

    // === ワーカー ===
    async function loadWorkerStatus() {
      try {
        const res = await fetch(`${BASE}/api/price-revision/worker`);
        const d = await res.json();
        document.getElementById('workerDot').className = 'status-dot ' + (d.running ? 'active' : 'inactive');
        document.getElementById('workerLabel').textContent = !d.enabled ? 'SQS未設定' : d.running ? '稼働中' : '停止';
        const s = d.stats;
        document.getElementById('statsInfo').textContent =
          `受信:${s.received} 処理:${s.processed} 更新:${s.updated} エラー:${s.errors}`;
      } catch(e) {}
    }
    async function startWorker() { await fetch(`${BASE}/api/price-revision/worker/start`,{method:'POST'}); loadWorkerStatus(); }
    async function stopWorker() { await fetch(`${BASE}/api/price-revision/worker/stop`,{method:'POST'}); loadWorkerStatus(); }

    // === 商品同期（手動のみ。価格データはワーカーが常時更新） ===
    async function manualSync() {
      const el = document.getElementById('syncStatus');
      if (!confirm('Amazon商品一覧を同期します（1〜2分かかります）。実行しますか？')) return;
      el.innerHTML = '<span class="spinner" style="width:14px;height:14px;"></span>商品一覧を同期中...';
      try {
        const res = await fetch(`${BASE}/api/price-revision/sync`, { method: 'POST' });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        el.textContent = `同期完了: ${data.total}件 (新規${data.inserted} 更新${data.updated})`;
        loadProducts();
        fetch(`${BASE}/api/price-revision/refresh-cache`, { method: 'POST' });
      } catch (e) {
        el.textContent = '同期エラー: ' + e.message;
      }
    }

    // === 商品読み込み ===
    async function loadProducts() {
      try {
        const res = await fetch(`${BASE}/api/price-revision/products`);
        allProducts = await res.json();
        filterProducts();
      } catch (e) {
        document.getElementById('productsContainer').innerHTML = '<div class="empty-state">読み込みエラー</div>';
      }
    }

    function filterProducts() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const mf = document.getElementById('modeFilter').value;
      const ff = document.getElementById('fulfillmentFilter').value;
      filteredProducts = allProducts.filter(p => {
        if (q && !`${p.product_name||''} ${p.asin||''} ${p.sku||''} ${p.ne_product_code||''} ${p.jan||''}`.toLowerCase().includes(q)) return false;
        if (ff && p.fulfillment !== ff) return false;
        if (mf === '_none' && p.price_tracking && p.price_tracking !== '' && p.price_tracking !== 'しない') return false;
        if (mf && mf !== '_none' && p.price_tracking !== mf) return false;
        return true;
      });
      currentPage = 1;
      document.getElementById('productCount').textContent = `約${filteredProducts.length}件`;
      renderPage();
    }

    function renderPage() {
      const totalPages = Math.ceil(filteredProducts.length / PER_PAGE);
      const start = (currentPage - 1) * PER_PAGE;
      const pageItems = filteredProducts.slice(start, start + PER_PAGE);
      renderProducts(pageItems);
      renderPagination(totalPages);
    }

    function goToPage(page) {
      currentPage = page;
      renderPage();
      window.scrollTo(0, 0);
    }

    function renderPagination(totalPages) {
      const el = document.getElementById('pagination');
      if (totalPages <= 1) { el.innerHTML = ''; return; }
      let html = '';
      html += `<button ${currentPage===1?'disabled':''} onclick="goToPage(1)">最初のページ...</button>`;
      const startP = Math.max(1, currentPage - 2);
      const endP = Math.min(totalPages, currentPage + 2);
      for (let i = startP; i <= endP; i++) {
        html += `<button class="${i===currentPage?'active':''}" onclick="goToPage(${i})">${i}</button>`;
      }
      if (endP < totalPages) html += `<span class="page-info">...</span>`;
      html += `<button ${currentPage===totalPages?'disabled':''} onclick="goToPage(${currentPage+1})">次の${PER_PAGE}件</button>`;
      el.innerHTML = html;
    }

    function getAmazonImage(asin) {
      if (!asin) return '';
      return `https://images-na.ssl-images-amazon.com/images/P/${asin}.09.LZZZZZZZ.jpg`;
    }

    function renderProducts(products) {
      const c = document.getElementById('productsContainer');
      if (!products.length) { c.innerHTML = '<div class="empty-state">商品がありません</div>'; return; }

      let html = '';
      for (const p of products) {
        const mode = p.price_tracking || '';
        const img = p.image_url || getAmazonImage(p.asin);
        const cost = p.wholesale_price_with_tax || p.wholesale_price || '';
        const fee = p.total_fee || 0;
        const profit = p.selling_price && cost ? p.selling_price - cost - fee : null;
        const profitRate = profit !== null && p.selling_price ? Math.round(profit / p.selling_price * 100) : null;
        const shipping = p.fulfillment === 'FBA' ? '送料¥0' : '送料別';

        html += `<div class="product-row" data-id="${p.id}">
          <div class="col-check"><input type="checkbox"></div>
          <div class="col-img"><img src="${esc(img)}" onerror="this.style.display='none'" alt=""></div>
          <div class="col-info">
            <div class="pname" title="${esc(p.product_name||'')}">${esc(p.product_name||'-')}</div>
            <div><a class="asin" href="https://www.amazon.co.jp/dp/${p.asin}" target="_blank">${p.asin||'-'}</a></div>
            <div class="sku">${esc(p.sku || p.ne_product_code || '-')}</div>
          </div>
          <div class="col-price">
            <div class="label">出品価格</div>
            <div>¥ <input type="number" value="${p.selling_price||''}" onchange="saveField(${p.id},'selling_price',this.value,this)"></div>
            <div class="sub">${shipping}</div>
            <div class="sub">合計 ¥${p.selling_price||'-'}</div>
          </div>
          <div class="col-comp">
            <div class="comp-title">カート価格</div>
            <div class="comp-price">${p.competitor_price ? '¥'+p.competitor_price.toLocaleString() : '-'}</div>
            <div class="comp-detail">${p.fulfillment==='FBA'?'FBA':'自己発送'}</div>
            <div class="comp-time">${p.last_checked_at ? '('+p.last_checked_at+')' : ''}</div>
          </div>
          <div class="col-mode">
            ${['FBA最安値','最安値','カート','カスタム','しない'].map(m =>
              `<div class="mode-btn${mode===m?' active':''}" data-mode="${m}" onclick="setMode(this,${p.id},'${m}')">${m}</div>`
            ).join('')}
          </div>
          <div class="col-cost">
            <div class="label">仕入れ価格</div>
            <div style="color:#c0392b;">¥ <input type="number" value="${cost}" onchange="saveField(${p.id},'wholesale_price_with_tax',this.value,this)"></div>
          </div>
          <div class="col-stopper">
            <div class="s-group"><span class="s-label">高値</span>¥ <input type="number" value="${p.high_stopper||''}" onchange="saveField(${p.id},'high_stopper',this.value,this)"></div>
            <div class="s-group"><span class="s-label" style="color:#c0392b;">赤字</span>¥ <input type="number" value="${p.loss_stopper||''}" onchange="saveField(${p.id},'loss_stopper',this.value,this)"></div>
            ${profit !== null ? `<div class="profit ${profit>=0?'pos':'neg'}">粗利益 ¥${profit.toLocaleString()}</div>` : ''}
          </div>
          <div class="col-profit">
            <div class="label" style="font-size:9px;color:#999;">手数料</div>
            <div style="font-size:11px;">${fee ? '¥'+fee.toLocaleString() : '-'}</div>
            <div class="label" style="font-size:9px;color:#999;margin-top:4px;">粗利益</div>
            <div class="profit-val ${profit!==null?(profit>=0?'pos':'neg'):''}">${profit!==null?'¥'+profit.toLocaleString():'-'}</div>
            ${profitRate!==null?`<div class="profit-rate">(${profitRate}%)</div>`:''}
          </div>
        </div>`;
      }
      c.innerHTML = html;
    }

    // === モード変更 ===
    async function setMode(el, id, mode) {
      el.closest('.col-mode').querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      const val = mode === 'しない' ? '' : mode;
      await fetch(`${BASE}/api/products/${id}`, {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ price_tracking: val }),
      });
      flashRow(el);
      fetch(`${BASE}/api/price-revision/refresh-cache`, { method: 'POST' });
    }

    // === フィールド保存 ===
    async function saveField(id, field, value, inputEl) {
      const data = {};
      data[field] = value ? parseInt(value) : null;
      await fetch(`${BASE}/api/products/${id}`, {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(data),
      });
      flashRow(inputEl);
    }

    function flashRow(el) {
      const row = el.closest('.product-row');
      if (row) { row.classList.add('saved-flash'); setTimeout(() => row.classList.remove('saved-flash'), 600); }
    }

    // === 履歴 ===
    async function loadHistory() {
      try {
        const res = await fetch(`${BASE}/api/price-revision/history?limit=100`);
        const hist = await res.json();
        const c = document.getElementById('historyContainer');
        if (!hist.length) { c.innerHTML = '<div class="empty-state">履歴がありません</div>'; return; }
        let h = '<table class="history-table"><thead><tr><th>日時</th><th>ASIN</th><th>SKU</th><th>モード</th><th class="num">旧価格</th><th class="num">新価格</th><th class="num">差額</th><th class="num">競合</th><th>理由</th></tr></thead><tbody>';
        for (const r of hist) {
          const d = (r.new_price||0)-(r.old_price||0);
          h += `<tr><td style="white-space:nowrap">${r.created_at||'-'}</td><td><a href="https://www.amazon.co.jp/dp/${r.asin}" target="_blank">${r.asin}</a></td><td>${esc(r.sku||'-')}</td><td>${r.mode||'-'}</td><td class="num">${r.old_price?'¥'+r.old_price.toLocaleString():'-'}</td><td class="num">${r.new_price?'¥'+r.new_price.toLocaleString():'-'}</td><td class="num ${d>0?'positive':d<0?'negative':''}">${d>0?'+':''}${d.toLocaleString()}</td><td class="num">${r.competitor_price?'¥'+r.competitor_price.toLocaleString():'-'}</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r.reason||'')}">${esc(r.reason||'-')}</td></tr>`;
        }
        h += '</tbody></table>';
        c.innerHTML = h;
      } catch(e) { document.getElementById('historyContainer').innerHTML = '<div class="empty-state">読み込みエラー</div>'; }
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    // === 初期化（DBから即表示。価格データはワーカーが裏で常時更新済み） ===
    loadWorkerStatus();
    loadProducts();
    loadHistory();
    setInterval(loadWorkerStatus, 30000);
  </script>
</body>
</html>
