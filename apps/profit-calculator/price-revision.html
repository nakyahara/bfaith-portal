<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>価格改定 — リサーチ仕入れツール</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif; background: #f0f0f0; color: #333; font-size: 12px; }
    a { color: #0066c0; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .header { background: #232f3e; color: #fff; padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 17px; font-weight: bold; }
    .header h1 span { color: #ff9900; }
    .page-tabs { display: flex; background: #37475a; padding: 0 24px; }
    .page-tab { padding: 10px 20px; color: #ccc; font-size: 13px; font-weight: bold; text-decoration: none; border-bottom: 3px solid transparent; }
    .page-tab:hover { color: #fff; text-decoration: none; }
    .page-tab.active { color: #fff; border-bottom-color: #ff9900; }

    /* ツールバー */
    .toolbar { background: #fff; border-bottom: 1px solid #ddd; padding: 6px 12px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-size: 11px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot.on { background: #2ecc71; }
    .dot.off { background: #ccc; }
    .toolbar .right { margin-left: auto; display: flex; gap: 6px; align-items: center; }
    .tbtn { padding: 3px 8px; border: 1px solid #ccc; border-radius: 3px; background: #fafafa; cursor: pointer; font-size: 11px; }
    .tbtn:hover { background: #eee; }

    /* 検索バー */
    .search-bar { background: #5b7daa; padding: 6px 12px; display: flex; gap: 8px; align-items: center; }
    .search-bar input[type=text] { padding: 5px 10px; border: none; border-radius: 3px; font-size: 13px; width: 280px; }
    .search-bar .sbtn { padding: 5px 16px; background: #ff9900; border: none; border-radius: 3px; color: #fff; font-weight: bold; font-size: 13px; cursor: pointer; }
    .search-bar select { padding: 4px; border: none; border-radius: 3px; font-size: 11px; }

    /* 結果バー */
    .result-bar { background: #fff; border-bottom: 1px solid #ddd; padding: 4px 12px; font-size: 11px; display: flex; align-items: center; gap: 8px; }
    .result-bar b { font-size: 12px; }
    .badge { background: #ff9900; color: #fff; padding: 1px 8px; border-radius: 3px; font-size: 10px; font-weight: bold; }

    /* タブ */
    .vtabs { display: flex; gap: 0; padding: 6px 12px 0; }
    .vtab { padding: 6px 16px; background: #e0e0e0; border: 1px solid #ccc; border-bottom: none; border-radius: 5px 5px 0 0; cursor: pointer; font-size: 11px; font-weight: bold; color: #666; }
    .vtab.active { background: #fff; color: #333; }
    .tab-body { display: none; }
    .tab-body.active { display: block; }

    /* テーブルヘッダー */
    .t-head { display: grid; grid-template-columns: 28px 50px 80px minmax(180px,1fr) 120px 130px 160px 95px 120px 90px; background: #f5f5f5; border: 1px solid #ddd; border-bottom: 2px solid #ccc; font-size: 10px; font-weight: bold; color: #666; text-align: center; }
    .t-head > div { padding: 6px 4px; border-right: 1px solid #e0e0e0; line-height: 1.3; }

    /* 商品行 */
    .p-row { display: grid; grid-template-columns: 28px 50px 80px minmax(180px,1fr) 120px 130px 160px 95px 120px 90px; border: 1px solid #ddd; border-top: none; background: #fff; min-height: 100px; }
    .p-row:nth-child(even) { background: #fcfcfc; }
    .p-row:hover { background: #fffff0; }
    .p-row > div { padding: 5px 4px; border-right: 1px solid #f0f0f0; font-size: 11px; }
    .p-row > div:last-child { border-right: none; }

    /* チェック */
    .c-chk { display: flex; align-items: center; justify-content: center; }
    .c-chk input { width: 15px; height: 15px; }

    /* ステータス */
    .c-status { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; font-size: 10px; }
    .c-status .st-label { font-weight: bold; color: #333; }
    .c-status button { font-size: 9px; padding: 1px 6px; border: 1px solid #ccc; border-radius: 3px; background: #f7f7f7; cursor: pointer; }

    /* 画像 */
    .c-img { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; }
    .c-img img { width: 60px; height: 60px; object-fit: contain; }
    .c-img .var-badge { background: #ff6600; color: #fff; font-size: 8px; padding: 1px 4px; border-radius: 2px; font-weight: bold; }

    /* 商品情報 */
    .c-info { display: flex; flex-direction: column; justify-content: center; gap: 2px; padding: 5px 6px !important; min-width: 0; }
    .c-info .pname { font-size: 11px; color: #0066c0; font-weight: bold; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.3; }
    .c-info .sku { font-size: 10px; color: #888; }
    .c-info .asin { font-size: 10px; color: #0066c0; }

    /* 出品価格 */
    .c-price { display: flex; flex-direction: column; gap: 2px; justify-content: center; }
    .c-price .lbl { font-size: 9px; color: #999; }
    .c-price .p-input { display: flex; align-items: center; gap: 2px; }
    .c-price .p-input span { font-size: 11px; color: #666; }
    .c-price input { width: 70px; padding: 3px 4px; border: 1px solid #bbb; font-size: 13px; text-align: right; }
    .c-price input:focus { border-color: #ff9900; outline: none; }
    .c-price .sub { font-size: 9px; color: #888; }
    .c-price .cond { font-size: 10px; color: #333; }

    /* カート価格 */
    .c-comp { display: flex; flex-direction: column; gap: 1px; justify-content: center; font-size: 10px; }
    .c-comp .ct { font-weight: bold; color: #333; }
    .c-comp .cv { font-size: 13px; font-weight: bold; color: #333; }
    .c-comp .cd { color: #666; }
    .c-comp .ct-time { font-size: 9px; color: #999; }

    /* モードボタン */
    .c-mode { display: flex; flex-direction: column; gap: 2px; justify-content: center; padding: 4px 3px !important; }
    .mbtn { padding: 4px 2px; border: 2px solid #ddd; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; text-align: center; background: #fff; color: #555; }
    .mbtn:hover { border-color: #ff9900; }
    .mbtn.on { color: #fff; border-color: transparent; }
    .mbtn.on[data-m="FBA最安値"] { background: #5b9bd5; }
    .mbtn.on[data-m="最安値"] { background: #e07020; }
    .mbtn.on[data-m="カート"] { background: #4caf50; }
    .mbtn.on[data-m="カスタム"] { background: #9c27b0; }
    .mbtn.on[data-m="しない"] { background: #9e9e9e; }

    /* 仕入れ価格 */
    .c-cost { display: flex; flex-direction: column; gap: 3px; justify-content: center; align-items: center; }
    .c-cost .cost-input { display: flex; align-items: center; gap: 1px; }
    .c-cost .cost-input span { color: #c0392b; font-size: 13px; font-weight: bold; }
    .c-cost input { width: 60px; padding: 3px 4px; border: 1px solid #bbb; font-size: 13px; text-align: right; color: #c0392b; font-weight: bold; }
    .c-cost input:focus { border-color: #ff9900; outline: none; }

    /* ストッパー */
    .c-stop { display: flex; flex-direction: column; gap: 4px; justify-content: center; font-size: 10px; }
    .c-stop .sg { display: flex; align-items: center; gap: 2px; }
    .c-stop .sg .sl { font-size: 9px; min-width: 40px; }
    .c-stop .sg .sl.hi { color: #5b9bd5; font-weight: bold; }
    .c-stop .sg .sl.lo { color: #c0392b; font-weight: bold; }
    .c-stop input { width: 55px; padding: 2px 3px; border: 1px solid #bbb; font-size: 11px; text-align: right; }
    .c-stop input:focus { border-color: #ff9900; outline: none; }
    .c-stop .profit-line { font-size: 10px; margin-top: 2px; }
    .c-stop .profit-line.pos { color: #4caf50; font-weight: bold; }
    .c-stop .profit-line.neg { color: #c0392b; font-weight: bold; }

    /* 手数料・粗利 */
    .c-profit { display: flex; flex-direction: column; gap: 2px; justify-content: center; text-align: center; font-size: 10px; }
    .c-profit .fee-lbl { font-size: 9px; color: #999; }
    .c-profit .fee-val { font-size: 11px; }
    .c-profit .pv { font-size: 14px; font-weight: bold; }
    .c-profit .pv.pos { color: #4caf50; }
    .c-profit .pv.neg { color: #c0392b; }
    .c-profit .pr { font-size: 10px; color: #888; }
    .c-profit .recalc { font-size: 9px; color: #0066c0; cursor: pointer; }

    .flash { animation: bg-flash 0.5s; }
    @keyframes bg-flash { 0%{background:#d4edda;} 100%{background:inherit;} }
    .empty { text-align: center; padding: 50px; background: #fff; color: #999; font-size: 13px; border: 1px solid #ddd; }
    .loading { text-align: center; padding: 30px; color: #888; }
    .sp { display: inline-block; width: 16px; height: 16px; border: 2px solid #ddd; border-top-color: #ff9900; border-radius: 50%; animation: spin 0.5s linear infinite; vertical-align: middle; margin-right: 4px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ページネーション */
    .pager { display: flex; justify-content: center; gap: 3px; padding: 10px; background: #fff; border: 1px solid #ddd; border-top: none; }
    .pager button { padding: 5px 12px; border: 1px solid #ccc; border-radius: 3px; background: #fff; cursor: pointer; font-size: 11px; }
    .pager button:hover { background: #f0f0f0; }
    .pager button.cur { background: #5b9bd5; color: #fff; border-color: #5b9bd5; }
    .pager button:disabled { opacity: 0.3; cursor: default; }

    /* 履歴 */
    .htbl { width: 100%; border-collapse: collapse; font-size: 11px; background: #fff; }
    .htbl th { background: #f5f5f5; padding: 5px 6px; text-align: left; border-bottom: 2px solid #ddd; font-size: 10px; }
    .htbl td { padding: 4px 6px; border-bottom: 1px solid #eee; }
    .htbl .n { text-align: right; }
    .pos { color: #4caf50; }
    .neg { color: #c0392b; }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>B-Faith</span> リサーチ仕入れツール</h1>
    <a href="/" style="color:#ff9900;font-size:13px;">ポータルに戻る</a>
  </div>
  <div class="page-tabs">
    <a href="./research" class="page-tab">リサーチ・見積もり</a>
    <a href="./" class="page-tab">商品計算</a>
    <a href="./products" class="page-tab">NE商品登録</a>
    <a href="./amazon" class="page-tab">Amazon出品</a>
    <a href="./amazon-manual" class="page-tab">Amazon出品手動</a>
    <a href="./price-revision" class="page-tab active">価格改定</a>
    <a href="./suppliers" class="page-tab" style="margin-left:auto;">仕入れ先管理</a>
    <a href="./shipping" class="page-tab">送料管理</a>
    <a href="./settings" class="page-tab">設定</a>
  </div>

  <div class="toolbar">
    <span class="dot" id="wDot"></span>
    <span id="wLabel">-</span>
    <span style="color:#999;" id="wStats"></span>
    <span style="color:#999;" id="syncSt"></span>
    <div class="right">
      <button class="tbtn" onclick="startW()">開始</button>
      <button class="tbtn" onclick="stopW()">停止</button>
      <button class="tbtn" onclick="doSync()">商品同期</button>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" id="q" placeholder="キーワード, JAN, SKU, ASIN" oninput="doFilter()">
    <button class="sbtn" onclick="doFilter()">検索</button>
    <select id="fMode" onchange="doFilter()">
      <option value="">価格の自動変更 ▼</option>
      <option value="FBA最安値">FBA最安値</option>
      <option value="最安値">最安値</option>
      <option value="カート">カート</option>
      <option value="カスタム">カスタム</option>
      <option value="しない">しない</option>
      <option value="_no">未設定</option>
    </select>
    <select id="fFul" onchange="doFilter()">
      <option value="">配送 ▼</option>
      <option value="FBA">FBA</option>
      <option value="FBM">自己発送</option>
    </select>
    <span style="color:#fff;font-size:11px;">表示件数</span>
    <select id="perPage" onchange="pg=1;doFilter()">
      <option value="50">50件</option>
      <option value="150" selected>150件</option>
      <option value="300">300件</option>
    </select>
  </div>

  <div class="result-bar">
    検索結果：<b id="cnt">-</b> &nbsp; <span class="badge">出品中</span>
  </div>

  <div class="vtabs">
    <div class="vtab active" onclick="stab('list',this)">在庫一覧</div>
    <div class="vtab" onclick="stab('hist',this)">価格変動履歴</div>
  </div>

  <div class="tab-body active" id="tab-list">
    <div class="t-head">
      <div></div>
      <div>ステータス</div>
      <div>画像<br>ASIN</div>
      <div style="text-align:left;">商品名<br>SKU</div>
      <div>出品価格<br>+配送料</div>
      <div>最低価格<br>+配送料</div>
      <div>価格の自動変更</div>
      <div>仕入れ価格</div>
      <div>高値ストッパー<br><span style="color:#c0392b">赤字ストッパー</span></div>
      <div>手数料<br><span style="color:#4caf50">粗利益</span></div>
    </div>
    <div id="pList"><div class="loading"><span class="sp"></span>読み込み中...</div></div>
    <div class="pager" id="pager"></div>
  </div>

  <div class="tab-body" id="tab-hist">
    <div id="hList" style="padding:8px;"><div class="loading"><span class="sp"></span>読み込み中...</div></div>
  </div>

<script>
const B='.';
let all=[],filtered=[],pg=1;
function stab(t,el){document.querySelectorAll('.vtab').forEach(v=>v.classList.remove('active'));document.querySelectorAll('.tab-body').forEach(v=>v.classList.remove('active'));el.classList.add('active');document.getElementById('tab-'+t).classList.add('active');}

// Worker
async function loadW(){try{const r=await(await fetch(B+'/api/price-revision/worker')).json();document.getElementById('wDot').className='dot '+(r.running?'on':'off');document.getElementById('wLabel').textContent=!r.enabled?'SQS未設定':r.running?'稼働中':'停止';const s=r.stats;document.getElementById('wStats').textContent=`受信:${s.received} 処理:${s.processed} 更新:${s.updated} エラー:${s.errors}`;}catch(e){}}
async function startW(){await fetch(B+'/api/price-revision/worker/start',{method:'POST'});loadW();}
async function stopW(){await fetch(B+'/api/price-revision/worker/stop',{method:'POST'});loadW();}
async function doSync(){
  if(!confirm('Amazon商品一覧を同期します（1〜2分）。実行しますか？'))return;
  const el=document.getElementById('syncSt');
  el.innerHTML='<span class="sp"></span>同期中...';
  try{const r=await(await fetch(B+'/api/price-revision/sync',{method:'POST'})).json();
  if(r.error)throw new Error(r.error);
  el.textContent=`同期完了: ${r.total}件(新規${r.inserted} 更新${r.updated})`;
  if(r.debug && r.inserted===0 && r.updated===0){
    console.log('[Sync Debug]', r.debug);
    alert('同期デバッグ情報:\n\nキー: '+((r.debug.allKeys||[]).join(', '))+'\n\n検出ASIN: '+(r.debug.detectedAsin||'なし')+'\n検出SKU: '+(r.debug.detectedSku||'なし')+'\n\n1行目: '+JSON.stringify(r.debug.sampleRow||{}).slice(0,500));
  }
  loadP();
  fetch(B+'/api/price-revision/refresh-cache',{method:'POST'});
  }catch(e){el.textContent='エラー: '+e.message;}
}

// Products
async function loadP(){try{all=await(await fetch(B+'/api/price-revision/products')).json();doFilter();}catch(e){document.getElementById('pList').innerHTML='<div class="empty">読み込みエラー</div>';}}

function doFilter(){
  const q=document.getElementById('q').value.toLowerCase(),mf=document.getElementById('fMode').value,ff=document.getElementById('fFul').value;
  filtered=all.filter(p=>{
    if(q&&!`${p.product_name||''} ${p.asin||''} ${p.sku||''} ${p.ne_product_code||''} ${p.jan||''}`.toLowerCase().includes(q))return false;
    if(ff&&p.fulfillment!==ff)return false;
    if(mf==='_no'&&p.price_tracking&&p.price_tracking!==''&&p.price_tracking!=='しない')return false;
    if(mf&&mf!=='_no'&&p.price_tracking!==mf)return false;
    return true;
  });
  pg=1;
  document.getElementById('cnt').textContent='約'+filtered.length+'件';
  renderPg();
}

function renderPg(){
  const pp=parseInt(document.getElementById('perPage').value);
  const tp=Math.ceil(filtered.length/pp);
  const items=filtered.slice((pg-1)*pp,pg*pp);
  render(items);
  // pager
  const pe=document.getElementById('pager');
  if(tp<=1){pe.innerHTML='';return;}
  let h=`<button ${pg===1?'disabled':''} onclick="pg=1;renderPg()">最初のページ...</button>`;
  const s=Math.max(1,pg-3),e=Math.min(tp,pg+3);
  for(let i=s;i<=e;i++)h+=`<button class="${i===pg?'cur':''}" onclick="pg=${i};renderPg()">${i}</button>`;
  if(e<tp)h+='<span style="padding:0 4px;">...</span>';
  h+=`<button ${pg>=tp?'disabled':''} onclick="pg=${pg+1};renderPg()">次の${pp}件</button>`;
  pe.innerHTML=h;
  window.scrollTo(0,0);
}

function aImg(a){return a?`https://images-na.ssl-images-amazon.com/images/P/${a}.09.LZZZZZZZ.jpg`:'';}

function render(ps){
  const c=document.getElementById('pList');
  if(!ps.length){c.innerHTML='<div class="empty">商品がありません</div>';return;}
  let h='';
  for(const p of ps){
    const m=p.price_tracking||'';
    const img=p.image_url||aImg(p.asin);
    const cost=p.wholesale_price_with_tax||p.wholesale_price||'';
    const fee=p.total_fee||0;
    const sp=p.selling_price||0;
    const profit=sp&&cost?sp-cost-fee:null;
    const pRate=profit!==null&&sp?Math.round(profit/sp*100):null;
    const isFba=p.fulfillment==='FBA';
    h+=`<div class="p-row" data-id="${p.id}">
      <div class="c-chk"><input type="checkbox"></div>
      <div class="c-status">
        <div class="st-label">出品中</div>
        <button onclick="window.open('https://www.amazon.co.jp/dp/${p.asin}','_blank')">詳細</button>
      </div>
      <div class="c-img">
        <img src="${E(img)}" onerror="this.style.display='none'" alt="">
        <a class="asin" href="https://www.amazon.co.jp/dp/${p.asin}" target="_blank" style="font-size:10px;">${p.asin||'-'}</a>
      </div>
      <div class="c-info">
        <div class="pname" title="${E(p.product_name||'')}">${E(p.product_name||'-')}</div>
        <div class="sku">${E(p.sku||p.ne_product_code||'-')}</div>
      </div>
      <div class="c-price">
        <div class="lbl">出品価格</div>
        <div class="p-input"><span>¥</span><input type="number" value="${sp||''}" onchange="sv(${p.id},'selling_price',this.value,this)"></div>
        <div class="sub">送料 ¥${isFba?'0':'別'}</div>
        <div class="sub">合計 ¥${sp?sp.toLocaleString():'-'}</div>
        <div class="cond">${isFba?'新品<br>FBA':'新品<br>自己発送'}</div>
      </div>
      <div class="c-comp">
        <div class="ct">カート価格</div>
        <div class="cv">¥${p.competitor_price?p.competitor_price.toLocaleString():'-'}</div>
        <div class="cd">(送料 0)</div>
        <div class="cd">(合計 ${p.competitor_price||'-'})</div>
        <div class="cd">新品</div>
        <div class="ct-time">${p.last_checked_at?'('+p.last_checked_at+')':''}</div>
      </div>
      <div class="c-mode">
        ${['FBA最安値','最安値','カート','カスタム','しない'].map(v=>
          `<div class="mbtn${m===v?' on':''}" data-m="${v}" onclick="setM(this,${p.id},'${v}')">${v}</div>`
        ).join('')}
      </div>
      <div class="c-cost">
        <div class="cost-input"><span>¥</span><input type="number" value="${cost}" onchange="sv(${p.id},'wholesale_price_with_tax',this.value,this)"></div>
      </div>
      <div class="c-stop">
        <div class="sg"><span class="sl hi">高値ストッパー</span></div>
        <div class="sg"><span>¥</span><input type="number" value="${p.high_stopper||''}" onchange="sv(${p.id},'high_stopper',this.value,this)"></div>
        <div class="sg" style="margin-top:4px;"><span class="sl lo">赤字ストッパー</span></div>
        <div class="sg"><span>¥</span><input type="number" value="${p.loss_stopper||''}" onchange="sv(${p.id},'loss_stopper',this.value,this)"></div>
        ${profit!==null?`<div class="profit-line ${profit>=0?'pos':'neg'}">粗利益<br>¥${profit.toLocaleString()}</div>`:''}
      </div>
      <div class="c-profit">
        <div class="fee-lbl">手数料</div>
        <div class="fee-val">${fee?'¥'+fee.toLocaleString():'-'}</div>
        <div class="fee-lbl" style="margin-top:4px;">粗利益</div>
        <div class="pv ${profit!==null?(profit>=0?'pos':'neg'):''}">¥${profit!==null?profit.toLocaleString():'-'}</div>
        ${pRate!==null?`<div class="pr">(${pRate}%)</div>`:''}
      </div>
    </div>`;
  }
  c.innerHTML=h;
}

async function setM(el,id,m){
  el.closest('.c-mode').querySelectorAll('.mbtn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  await fetch(B+'/api/products/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({price_tracking:m==='しない'?'':m})});
  fl(el);fetch(B+'/api/price-revision/refresh-cache',{method:'POST'});
}
async function sv(id,f,v,el){
  const d={};d[f]=v?parseInt(v):null;
  await fetch(B+'/api/products/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});
  fl(el);
}
function fl(el){const r=el.closest('.p-row');if(r){r.classList.add('flash');setTimeout(()=>r.classList.remove('flash'),600);}}

// History
async function loadH(){try{
  const h=await(await fetch(B+'/api/price-revision/history?limit=100')).json();
  const c=document.getElementById('hList');
  if(!h.length){c.innerHTML='<div class="empty">履歴がありません</div>';return;}
  let t='<table class="htbl"><thead><tr><th>日時</th><th>ASIN</th><th>SKU</th><th>モード</th><th class="n">旧価格</th><th class="n">新価格</th><th class="n">差額</th><th class="n">競合</th><th>理由</th></tr></thead><tbody>';
  for(const r of h){const d=(r.new_price||0)-(r.old_price||0);
    t+=`<tr><td style="white-space:nowrap">${r.created_at||'-'}</td><td><a href="https://www.amazon.co.jp/dp/${r.asin}" target="_blank">${r.asin}</a></td><td>${E(r.sku||'-')}</td><td>${r.mode||'-'}</td><td class="n">${r.old_price?'¥'+r.old_price.toLocaleString():'-'}</td><td class="n">${r.new_price?'¥'+r.new_price.toLocaleString():'-'}</td><td class="n ${d>0?'pos':d<0?'neg':''}">${d>0?'+':''}${d.toLocaleString()}</td><td class="n">${r.competitor_price?'¥'+r.competitor_price.toLocaleString():'-'}</td><td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${E(r.reason||'')}">${E(r.reason||'-')}</td></tr>`;}
  t+='</tbody></table>';c.innerHTML=t;
}catch(e){document.getElementById('hList').innerHTML='<div class="empty">読み込みエラー</div>';}}

function E(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

loadW();loadP();loadH();setInterval(loadW,30000);
</script>
