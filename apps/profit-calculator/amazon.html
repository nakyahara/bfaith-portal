<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon出品 — リサーチ仕入れツール</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif; background: #eaeded; color: #0f1111; font-size: 13px; }
    a { color: #0066c0; text-decoration: none; }

    .header { background: #232f3e; color: #fff; padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 17px; font-weight: bold; }
    .header h1 span { color: #ff9900; }
    .page-tabs { display: flex; background: #37475a; padding: 0 24px; }
    .page-tab { padding: 10px 20px; color: #ccc; font-size: 13px; font-weight: bold; text-decoration: none; border-bottom: 3px solid transparent; }
    .page-tab:hover { color: #fff; text-decoration: none; }
    .page-tab.active { color: #fff; border-bottom-color: #ff9900; }
    .container { max-width: 1400px; margin: 16px auto; padding: 0 16px; }

    .filter-bar { background: #fff; border: 1px solid #d5d9d9; border-radius: 6px; padding: 10px 16px; margin-bottom: 12px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .filter-bar select, .filter-bar input { padding: 5px 8px; border: 1px solid #888; border-radius: 4px; font-size: 13px; }
    .filter-bar input { width: 200px; }
    .filter-bar .count { margin-left: auto; font-size: 12px; color: #565959; }
    .btn { padding: 6px 14px; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; border: 1px solid; }
    .btn-sm { padding: 3px 10px; font-size: 11px; }
    .btn-export { background: #fff; border-color: #0066c0; color: #0066c0; }
    .btn-primary { background: #f0c14b; border-color: #a88734; color: #0f1111; }

    .data-table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #d5d9d9; border-radius: 6px; overflow: hidden; }
    .data-table th { background: #f7f8f8; padding: 8px 10px; text-align: left; font-size: 11px; color: #565959; border-bottom: 2px solid #d5d9d9; white-space: nowrap; }
    .data-table td { padding: 7px 10px; border-bottom: 1px solid #eee; vertical-align: middle; }
    .data-table tr.clickable:hover { background: #fafafa; cursor: pointer; }
    .expand-arrow { display: inline-block; width: 16px; font-size: 10px; color: #565959; transition: transform 0.2s; }
    .expand-arrow.open { transform: rotate(90deg); }
    .ne-type-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
    .ne-type-badge.単品 { background: #e3f2fd; color: #1565c0; }
    .ne-type-badge.複数 { background: #fce4ec; color: #c62828; }
    .data-table .asin-link { font-weight: bold; font-size: 12px; }
    .data-table .product-name-cell { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
    .data-table .num { text-align: right; font-variant-numeric: tabular-nums; }
    .positive { color: #007600; }
    .negative { color: #b12704; }

    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; white-space: nowrap; }
    .status-badge.NE登録前 { background: #e8d5f5; color: #6741d9; }
    .status-badge.NE登録済 { background: #d3f9d8; color: #2b8a3e; }
    .status-badge.入荷待ち { background: #fcc2d7; color: #c2255c; }
    .status-badge.Amazon出品済 { background: #b2f2bb; color: #087f23; }
    .status-badge.発注済 { background: #e8d5f5; color: #6741d9; }
    .status-badge.出品済 { background: #b2f2bb; color: #087f23; }
    .status-badge.Amazon出品エラー { background: #ffe0e0; color: #b12704; }
    .status-badge.NE在庫連携済 { background: #d0f0fd; color: #0c5460; }
    .fulfillment-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
    .fulfillment-badge.FBA { background: #fff3cd; color: #856404; }
    .fulfillment-badge.FBM { background: #d1ecf1; color: #0c5460; }

    /* 詳細パネル */
    .detail-panel { background: #fafafa; border-top: 2px solid #ff9900; padding: 16px 20px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .detail-section { background: #fff; border: 1px solid #d5d9d9; border-radius: 6px; padding: 12px 16px; }
    .detail-section-title { font-size: 12px; font-weight: bold; color: #232f3e; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #eee; }
    .detail-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; flex-wrap: wrap; }
    .detail-label { font-size: 11px; font-weight: bold; color: #565959; width: 100px; flex-shrink: 0; }
    .detail-input { flex: 1; padding: 4px 6px; border: 1px solid #ccc; border-radius: 3px; font-size: 12px; min-width: 80px; }
    .detail-input:focus { border-color: #e77600; outline: none; box-shadow: 0 0 3px #e77600; }
    .detail-select { padding: 4px 6px; border: 1px solid #ccc; border-radius: 3px; font-size: 12px; }
    .detail-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; padding-top: 10px; border-top: 1px solid #ddd; }
    .btn-save { background: #ff9900; border-color: #c77600; color: #0f1111; }

    .set-items-list { margin-top: 6px; }
    .set-item-row { display: flex; gap: 6px; align-items: center; margin-bottom: 4px; }
    .set-item-row input { padding: 3px 5px; border: 1px solid #ccc; border-radius: 3px; font-size: 12px; }

    .empty-msg { text-align: center; padding: 40px; color: #888; font-size: 14px; }
    .toast { position: fixed; top: 20px; right: 20px; background: #067D62; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; display: none; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>💰</span> リサーチ仕入れツール</h1>
    <a href="/" style="color:#ddd; font-size:13px; text-decoration:none;">← ポータルに戻る</a>
  </div>
  <div class="page-tabs">
    <a href="./research" class="page-tab">リサーチ・見積もり</a>
    <a href="./" class="page-tab">商品計算</a>
    <a href="./products" class="page-tab">NE商品登録</a>
    <a href="./amazon" class="page-tab active">Amazon出品</a>
    <a href="./suppliers" class="page-tab" style="margin-left:auto;">仕入れ先管理</a>
    <a href="./shipping" class="page-tab">送料管理</a>
    <a href="./settings" class="page-tab">設定</a>
  </div>

  <div class="container">
    <div class="filter-bar">
      <select id="statusFilter" onchange="loadData()">
        <option value="">全ステータス</option>
        <option value="入荷待ち">入荷待ち</option>
        <option value="Amazon出品済">Amazon出品済</option>
        <option value="Amazon出品エラー">Amazon出品エラー</option>
        <option value="NE在庫連携済">NE在庫連携済</option>
      </select>
      <input type="text" id="searchInput" placeholder="ASIN・商品名で検索" oninput="debounceLoad()">
      <select id="bulkStatusSelect" style="padding:5px 8px; border:1px solid #888; border-radius:4px; font-size:12px;">
        <option value="">一括ステータス変更</option>
        <option value="入荷待ち">入荷待ち</option>
        <option value="Amazon出品済">Amazon出品済</option>
        <option value="Amazon出品エラー">Amazon出品エラー</option>
        <option value="NE在庫連携済">NE在庫連携済</option>
      </select>
      <button class="btn btn-primary" onclick="bulkChangeStatus()" style="font-size:11px;">適用</button>
      <button class="btn" style="background:#232f3e; border-color:#232f3e; color:#ff9900; font-size:11px; font-weight:bold;" onclick="bulkListOnAmazon()">Amazon一括出品</button>
      <button class="btn" style="background:#fff; border-color:#0066c0; color:#0066c0; font-size:11px; font-weight:bold;" onclick="exportNeStockCsv()">NE在庫連携CSV</button>
      <span class="count" id="countDisplay">-</span>
    </div>
    <div id="tableContainer"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let debounceTimer = null;
    let allData = [];
    let expandedId = null;
    const STATUSES = ['入荷待ち', 'Amazon出品済', 'Amazon出品エラー', 'NE在庫連携済'];
    const STATUS_ORDER = { '入荷待ち': 0, 'Amazon出品エラー': 1, 'Amazon出品済': 2, 'NE在庫連携済': 3 };
    const AMAZON_STATUSES = new Set(['入荷待ち', 'Amazon出品済', 'Amazon出品エラー', 'NE在庫連携済']);

    let suppliers = [];

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await fetch('./api/suppliers');
        suppliers = await res.json();
      } catch (e) { console.error('仕入先読み込みエラー:', e); }
      loadData();
    });

    function debounceLoad() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(loadData, 300);
    }

    async function loadData() {
      const status = document.getElementById('statusFilter').value;
      const search = document.getElementById('searchInput').value.trim();
      const params = new URLSearchParams();
      if (status) params.set('status', status);
      if (search) params.set('search', search);

      try {
        const res = await fetch(`./api/products?${params}`);
        let rawData = await res.json();
        // Amazon出品ページ: 入荷待ち/Amazon出品済/Amazon出品エラーのみ表示
        allData = rawData.filter(p => AMAZON_STATUSES.has(p.status));
        // ステータス順 → 登録日新しい順にソート
        allData.sort((a, b) => {
          const sa = STATUS_ORDER[a.status] ?? 99;
          const sb = STATUS_ORDER[b.status] ?? 99;
          if (sa !== sb) return sa - sb;
          return (b.id || 0) - (a.id || 0);
        });
        document.getElementById('countDisplay').textContent = `${allData.length}件`;
        renderTable();
      } catch (err) {
        document.getElementById('tableContainer').innerHTML = `<div class="empty-msg">エラー: ${err.message}</div>`;
      }
    }

    function renderTable() {
      if (allData.length === 0) {
        document.getElementById('tableContainer').innerHTML = '<div class="empty-msg">データがありません<br><small>「商品計算」画面で計算→保存すると、ここに登録されます</small></div>';
        return;
      }

      const colCount = 13;
      let html = `<table class="data-table">
        <thead><tr>
          <th style="width:30px;"><input type="checkbox" id="checkAll" onclick="toggleCheckAll(this)"></th>
          <th style="width:20px;"></th>
          <th>NE登録</th><th>FBA/FBM</th><th>NE商品コード</th><th>ASIN</th><th>商品名</th><th>仕入れ先</th>
          <th>仕入価格</th><th>NE販売価格</th><th>利益率</th><th>ステータス</th><th>登録日</th>
        </tr></thead><tbody>`;

      for (const p of allData) {
        const neType = p.ne_registration_type || '単品';
        const isOpen = expandedId === p.id;
        html += `<tr class="clickable" onclick="toggleDetail(${p.id})">
          <td onclick="event.stopPropagation()"><input type="checkbox" class="row-check" value="${p.id}"></td>
          <td><span class="expand-arrow ${isOpen?'open':''}">▶</span></td>
          <td><span class="ne-type-badge ${neType}">${neType}</span></td>
          <td><span class="fulfillment-badge ${p.fulfillment === 'FBA' ? 'FBA' : 'FBM'}">${p.fulfillment === 'FBA' ? 'FBA' : '自社出荷'}</span></td>
          <td style="font-size:11px;">${esc(p.ne_product_code || '-')}</td>
          <td>${p.asin ? `<a class="asin-link" href="https://www.amazon.co.jp/dp/${p.asin}" target="_blank" onclick="event.stopPropagation()">${p.asin}</a>` : '-'}</td>
          <td class="product-name-cell" title="${esc(p.product_name || '')}">${esc(p.product_name || '-')}</td>
          <td>${esc(p.supplier_name || '-')}</td>
          <td class="num">${p.wholesale_price_with_tax ? '¥'+Number(p.wholesale_price_with_tax).toLocaleString() : '-'}</td>
          <td class="num">${p.ne_selling_price ? '¥'+Number(p.ne_selling_price).toLocaleString() : '-'}</td>
          <td class="num ${(p.profit_rate||0) >= 0.1 ? 'positive' : 'negative'}">${p.profit_rate != null ? (p.profit_rate*100).toFixed(1)+'%' : '-'}</td>
          <td onclick="event.stopPropagation()">
            <select class="status-select" onchange="changeStatus(${p.id}, this.value)" style="font-size:11px; padding:2px 4px; border-radius:4px;">
              ${['入荷待ち','Amazon出品済','Amazon出品エラー'].map(s => `<option value="${s}" ${p.status===s?'selected':''}>${s}</option>`).join('')}
            </select>
          </td>
          <td style="font-size:11px;">${p.created_at ? p.created_at.slice(0,10) : '-'}</td>
        </tr>`;

        if (isOpen) {
          html += `<tr><td colspan="${colCount}" style="padding:0;">${buildDetailPanel(p)}</td></tr>`;
        }
      }
      html += '</tbody></table>';
      document.getElementById('tableContainer').innerHTML = html;
    }

    async function toggleDetail(id) {
      if (expandedId === id) { expandedId = null; renderTable(); return; }
      // 詳細データ(セット内訳含む)を取得
      try {
        const res = await fetch(`./api/products/${id}`);
        const detail = await res.json();
        const idx = allData.findIndex(d => d.id === id);
        if (idx >= 0) allData[idx] = detail;
        expandedId = id;
        renderTable();
      } catch (e) { expandedId = id; renderTable(); }
    }

    function buildDetailPanel(p) {
      const items = p.set_items || [];
      const isSet = p.ne_registration_type === '複数';
      return `<div class="detail-panel">
        <div class="detail-grid">
          <div class="detail-section">
            <div class="detail-section-title">基本情報</div>
            ${dRow('商品名', 'product_name', p.product_name, p.id)}
            ${dRow('ASIN', 'asin', p.asin, p.id)}
            ${dRow('JAN', 'jan', p.jan, p.id)}
            ${dRow('型番', 'part_number', p.part_number, p.id)}
            ${dSupplierSelect(p.supplier_code, p.supplier_name, p.id)}
            ${dRow('メーカーURL', 'maker_url', p.maker_url, p.id)}
            ${dRow('コメント', 'comment', p.comment, p.id)}
            ${dSelect('ステータス', 'status', p.status, STATUSES, p.id)}
          </div>
          <div class="detail-section">
            <div class="detail-section-title">価格・利益</div>
            ${dRowWithEvent('卸価格(税抜)', 'wholesale_price', p.wholesale_price, p.id, 'number', `oninput="calcTaxIncl(${p.id})"` )}
            ${dRowReadonly('卸価格(税込)', 'wholesale_price_with_tax', p.wholesale_price_with_tax, p.id)}
            ${dRow('Amazon販売価格', 'selling_price', p.selling_price, p.id, 'number')}
            ${dRow('利益', 'profit', p.profit, p.id, 'number')}
            ${dSelect('FBA/FBM', 'fulfillment', p.fulfillment, ['FBA','自社出荷'], p.id)}
            ${dRow('赤字ストッパー', 'loss_stopper', p.loss_stopper, p.id, 'number')}
            ${dRow('高値ストッパー', 'high_stopper', p.high_stopper, p.id, 'number')}
            ${dSelect('価格追従', 'price_tracking', p.price_tracking, ['カート','最安値','手動'], p.id)}
            ${dSelect('Amazonポイント倍率', 'point_rate', p.point_rate, ['1倍','2倍','3倍','5倍','10倍'], p.id)}
          </div>
        </div>
        <div class="detail-grid" style="margin-top:12px;">
          <div class="detail-section">
            <div class="detail-section-title">NextEngine情報</div>
            ${dRow('NE商品コード', 'ne_product_code', p.ne_product_code, p.id)}
            ${dRow('NE仕入先コード', 'ne_supplier_code', p.ne_supplier_code, p.id)}
            ${dRow('NE販売価格', 'ne_selling_price', p.ne_selling_price, p.id, 'number')}
            ${dRow('NE発注ロット', 'ne_order_lot', p.ne_order_lot, p.id, 'number')}
            ${dSelectWithEvent('NE税率', 'ne_tax_rate', p.ne_tax_rate, ['10%','8%'], p.id, `onchange="calcTaxIncl(${p.id})"`)}
            ${dSelect('NE登録 単or複', 'ne_registration_type', p.ne_registration_type, ['単品','複数'], p.id)}
            ${dRow('NE代表コード', 'ne_representative_code', p.ne_representative_code, p.id)}
          </div>
          <div class="detail-section">
            <div class="detail-section-title">Amazon情報</div>
            ${dSelect('Ama 単or複', 'ama_single_or_set', p.ama_single_or_set, ['単品','セット','アソート'], p.id)}
            ${dSelect('バリエーション', 'variation_flag', p.variation_flag, ['なし','あり'], p.id)}
            <div class="detail-section-title" style="margin-top:12px;">セット内訳商品</div>
            <div id="set-items-${p.id}" class="set-items-list">
              ${items.map((item, i) => `
                <div class="set-item-row" data-set-row>
                  <span style="font-size:11px; color:#565959;">#${i+1}</span>
                  <input type="text" value="${esc(item.syohin_code)}" data-set-code style="width:150px;">
                  <span style="font-size:11px;">×</span>
                  <input type="number" value="${item.suryo}" data-set-qty style="width:50px;" min="1">
                  <button class="btn btn-sm" style="background:#fff0f0; border-color:#b12704; color:#b12704;" onclick="this.closest('[data-set-row]').remove()">削除</button>
                </div>
              `).join('')}
            </div>
            <button class="btn btn-sm" style="background:#f0f6ff; border-color:#0066c0; color:#1864ab; margin-top:4px;" onclick="addSetItem(${p.id})">＋ 内訳追加</button>
          </div>
        </div>
        <div class="detail-actions">
          <button class="btn" style="background:#fff0f0; border-color:#b12704; color:#b12704; margin-right:auto;" onclick="deleteProduct(${p.id}, '${esc(p.product_name || '')}')">削除</button>
          <button class="btn btn-save" onclick="saveDetail(${p.id})">保存</button>
          ${p.asin ? `<button class="btn" style="background:#232f3e; border-color:#232f3e; color:#ff9900; font-weight:bold;" onclick="listOnAmazon(${p.id})">Amazon出品</button>` : ''}
        </div>
      </div>`;
    }

    function dRow(label, key, value, id, type='text') {
      return `<div class="detail-row">
        <span class="detail-label">${label}</span>
        <input class="detail-input" type="${type}" id="d-${key}-${id}" value="${value != null ? esc(String(value)) : ''}" data-field="${key}">
      </div>`;
    }

    function dRowWithEvent(label, key, value, id, type='text', extra='') {
      return `<div class="detail-row">
        <span class="detail-label">${label}</span>
        <input class="detail-input" type="${type}" id="d-${key}-${id}" value="${value != null ? esc(String(value)) : ''}" data-field="${key}" ${extra}>
      </div>`;
    }

    function dRowReadonly(label, key, value, id) {
      return `<div class="detail-row">
        <span class="detail-label">${label}</span>
        <input class="detail-input" type="number" id="d-${key}-${id}" value="${value != null ? value : ''}" data-field="${key}" readonly style="background:#f7f8f8;">
      </div>`;
    }

    function dSelect(label, key, value, options, id) {
      return `<div class="detail-row">
        <span class="detail-label">${label}</span>
        <select class="detail-select" id="d-${key}-${id}" data-field="${key}">
          ${options.map(o => `<option value="${o}" ${value===o?'selected':''}>${o}</option>`).join('')}
        </select>
      </div>`;
    }

    function dSelectWithEvent(label, key, value, options, id, extra='') {
      return `<div class="detail-row">
        <span class="detail-label">${label}</span>
        <select class="detail-select" id="d-${key}-${id}" data-field="${key}" ${extra}>
          ${options.map(o => `<option value="${o}" ${value===o?'selected':''}>${o}</option>`).join('')}
        </select>
      </div>`;
    }

    function dSupplierSelect(currentCode, currentName, id) {
      let opts = '<option value="">選択してください</option>';
      let matched = false;
      for (const s of suppliers) {
        const sel = (s.code === currentCode) ? 'selected' : '';
        if (sel) matched = true;
        opts += `<option value="${s.code}" data-name="${esc(s.name)}" ${sel}>${s.code} - ${esc(s.name)}</option>`;
      }
      if (!matched && currentName) {
        opts += `<option value="" selected>${esc(currentName)}</option>`;
      }
      return `<div class="detail-row">
        <span class="detail-label">仕入先</span>
        <select class="detail-select" id="d-supplier-${id}" style="flex:1;" onchange="onDetailSupplierChange(${id})">
          ${opts}
        </select>
        <input type="hidden" id="d-supplier_code-${id}" data-field="supplier_code" value="${esc(currentCode || '')}">
        <input type="hidden" id="d-supplier_name-${id}" data-field="supplier_name" value="${esc(currentName || '')}">
      </div>`;
    }

    function onDetailSupplierChange(id) {
      const sel = document.getElementById(`d-supplier-${id}`);
      const opt = sel.options[sel.selectedIndex];
      document.getElementById(`d-supplier_code-${id}`).value = sel.value;
      document.getElementById(`d-supplier_name-${id}`).value = opt.dataset.name || opt.textContent;
      // NE仕入先コードも連動
      const neEl = document.getElementById(`d-ne_supplier_code-${id}`);
      if (neEl) neEl.value = sel.value;
    }

    function calcTaxIncl(id) {
      const wholesale = parseInt(document.getElementById(`d-wholesale_price-${id}`)?.value) || 0;
      const taxRateEl = document.getElementById(`d-ne_tax_rate-${id}`);
      const taxRate = taxRateEl ? parseInt(taxRateEl.value) : 10;
      const withTax = Math.ceil(wholesale * (1 + taxRate / 100));
      const taxInclEl = document.getElementById(`d-wholesale_price_with_tax-${id}`);
      if (taxInclEl) taxInclEl.value = withTax;
    }

    function addSetItem(productId) {
      const container = document.getElementById(`set-items-${productId}`);
      const cnt = container.querySelectorAll('[data-set-row]').length + 1;
      const row = document.createElement('div');
      row.className = 'set-item-row';
      row.setAttribute('data-set-row', '');
      row.innerHTML = `
        <span style="font-size:11px; color:#565959;">#${cnt}</span>
        <input type="text" data-set-code style="width:150px;" placeholder="内訳商品コード">
        <span style="font-size:11px;">×</span>
        <input type="number" value="1" data-set-qty style="width:50px;" min="1">
        <button class="btn btn-sm" style="background:#fff0f0; border-color:#b12704; color:#b12704;" onclick="this.closest('[data-set-row]').remove()">削除</button>
      `;
      container.appendChild(row);
    }

    async function saveDetail(id) {
      const panel = document.querySelector(`.detail-panel`);
      const fields = {};
      panel.querySelectorAll('[data-field]').forEach(el => {
        fields[el.dataset.field] = el.type === 'number' ? (el.value ? Number(el.value) : null) : el.value;
      });

      // セット内訳を収集
      const setItems = [];
      const container = document.getElementById(`set-items-${id}`);
      if (container) {
        container.querySelectorAll('[data-set-row]').forEach(row => {
          const code = row.querySelector('[data-set-code]')?.value?.trim();
          const qty = parseInt(row.querySelector('[data-set-qty]')?.value) || 1;
          if (code) setItems.push({ syohin_code: code, suryo: qty });
        });
      }
      fields.set_items = setItems;
      // NE仕入価格 = 卸価格と同値
      if (fields.wholesale_price != null) fields.ne_cost_excl_tax = fields.wholesale_price;

      try {
        const res = await fetch(`./api/products/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(fields),
        });
        const updated = await res.json();
        const idx = allData.findIndex(d => d.id === id);
        if (idx >= 0) allData[idx] = updated;
        renderTable();
        showToast('保存しました');
      } catch (e) { showToast('エラー: ' + e.message); }
    }

    async function changeStatus(id, status) {
      if (!status) return;
      await fetch(`./api/products/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status }),
      });
      showToast(`ステータスを「${status}」に変更`);
      loadData();
    }

    async function bulkChangeStatus() {
      const status = document.getElementById('bulkStatusSelect').value;
      if (!status) { alert('変更先のステータスを選択してください'); return; }
      const ids = getSelectedIds();
      if (ids.length === 0) { alert('対象の商品をチェックボックスで選択してください'); return; }
      if (!confirm(`${ids.length}件のステータスを「${status}」に変更しますか？`)) return;

      try {
        await Promise.all(ids.map(id =>
          fetch(`./api/products/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status }),
          })
        ));
        document.getElementById('bulkStatusSelect').value = '';
        showToast(`${ids.length}件を「${status}」に変更しました`);
        loadData();
      } catch (e) { alert('エラー: ' + e.message); }
    }

    async function bulkDelete() {
      const ids = getSelectedIds();
      if (ids.length === 0) { alert('削除する商品をチェックボックスで選択してください'); return; }
      if (!confirm(`${ids.length}件の商品を削除しますか？\nこの操作は取り消せません。`)) return;

      try {
        await Promise.all(ids.map(id =>
          fetch(`./api/products/${id}`, { method: 'DELETE' })
        ));
        expandedId = null;
        showToast(`${ids.length}件を削除しました`);
        loadData();
      } catch (e) { alert('エラー: ' + e.message); }
    }

    function toggleCheckAll(el) {
      document.querySelectorAll('.row-check').forEach(cb => cb.checked = el.checked);
    }

    function getSelectedIds() {
      return Array.from(document.querySelectorAll('.row-check:checked')).map(cb => cb.value);
    }

    async function listOnAmazon(id) {
      const p = allData.find(d => d.id === id);
      if (!p) return;
      const isFba = p.fulfillment === 'FBA';
      const skuInfo = isFba ? '自動採番(pr_日付_連番)' : (p.ne_product_code || '未設定');
      if (!confirm(`「${p.product_name}」をAmazonに出品しますか？\n\n種別: ${p.fulfillment}\nSKU: ${skuInfo}\n価格: ¥${(p.selling_price || p.ne_selling_price || 0).toLocaleString()}`)) return;

      try {
        const res = await fetch(`./api/products/${id}/list-amazon`, { method: 'POST' });
        const result = await res.json();
        if (!res.ok) { alert('出品エラー: ' + result.error); return; }
        if (result.issues && result.issues.length > 0) {
          alert('出品に問題があります:\n' + result.issues.map(i => `・${i.message}`).join('\n'));
        }
        showToast(`Amazon出品完了 (SKU: ${result.sku}, ステータス: ${result.status})`);
        loadData();
      } catch (e) { alert('通信エラー: ' + e.message); }
    }

    async function bulkListOnAmazon() {
      const ids = getSelectedIds();
      if (ids.length === 0) { alert('出品する商品をチェックボックスで選択してください'); return; }

      // ASINがない商品を除外
      const validProducts = ids.filter(id => {
        const p = allData.find(d => String(d.id) === String(id));
        return p && p.asin;
      });
      if (validProducts.length === 0) { alert('選択した商品にASINが設定されていません'); return; }
      if (validProducts.length < ids.length) {
        alert(`${ids.length - validProducts.length}件はASIN未設定のためスキップします`);
      }

      if (!confirm(`${validProducts.length}件をAmazonに出品しますか？`)) return;

      let ok = 0, ng = 0;
      const errors = [];
      for (const id of validProducts) {
        try {
          const res = await fetch(`./api/products/${id}/list-amazon`, { method: 'POST' });
          const result = await res.json();
          if (res.ok && result.status === 'ACCEPTED') {
            ok++;
          } else {
            ng++;
            const p = allData.find(d => String(d.id) === String(id));
            errors.push(`${p?.product_name || id}: ${result.error || result.status || '不明なエラー'}`);
          }
        } catch (e) {
          ng++;
          errors.push(`ID ${id}: ${e.message}`);
        }
      }
      if (errors.length > 0) {
        alert(`${ng}件エラー:\n\n${errors.join('\n')}`);
      }
      showToast(`Amazon出品: ${ok}件成功, ${ng}件エラー`);
      loadData();
    }

    async function deleteProduct(id, name) {
      if (!confirm(`「${name}」を削除しますか？\nこの操作は取り消せません。`)) return;
      try {
        const res = await fetch(`./api/products/${id}`, { method: 'DELETE' });
        if (res.ok) {
          expandedId = null;
          showToast('削除しました');
          loadData();
        } else {
          const err = await res.json();
          alert('削除失敗: ' + (err.error || ''));
        }
      } catch (e) { alert('エラー: ' + e.message); }
    }

    async function exportNeCsv(type) {
      const ids = getSelectedIds();
      if (ids.length === 0) { alert('CSV出力する商品をチェックボックスで選択してください'); return; }
      const params = new URLSearchParams();
      params.set('type', type);
      params.set('ids', ids.join(','));
      const url = `./api/products/csv/ne?${params}`;

      try {
        const res = await fetch(url);
        if (!res.ok) {
          const err = await res.json();
          if (err.details) {
            const msgs = err.details.map(d => `・${d.name}: ${d.missing.join(', ')}`).join('\n');
            alert(`必須項目が不足しています:\n\n${msgs}`);
          } else {
            alert(err.error || 'エラーが発生しました');
          }
          return;
        }
        const blob = await res.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = res.headers.get('Content-Disposition')?.match(/filename="(.+)"/)?.[1] || 'ne_export.csv';
        a.click();
        URL.revokeObjectURL(a.href);

        // NE登録前の商品をNE登録済に変更するか確認
        const neBeforeIds = ids.filter(id => {
          const p = allData.find(d => String(d.id) === String(id));
          return p && p.status === 'NE登録前';
        });
        if (neBeforeIds.length > 0) {
          if (confirm(`CSV出力した${neBeforeIds.length}件の「NE登録前」をステータス「NE登録済」に変更しますか？`)) {
            await Promise.all(neBeforeIds.map(id =>
              fetch(`./api/products/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'NE登録済' }),
              })
            ));
            showToast(`${neBeforeIds.length}件を「NE登録済」に変更しました`);
            loadData();
          }
        }
      } catch (e) { alert('通信エラー: ' + e.message); }
    }

    async function exportNeStockCsv() {
      const ids = getSelectedIds();
      if (ids.length === 0) { alert('CSV出力する商品をチェックボックスで選択してください'); return; }

      // FBM（自社出荷）かつAmazon出品済のみ対象
      const invalidProducts = [];
      const fbmListedIds = [];
      for (const id of ids) {
        const p = allData.find(d => String(d.id) === String(id));
        if (!p) continue;
        if (p.fulfillment === 'FBA') {
          invalidProducts.push(`${p.product_name || p.asin}: FBA出荷のため在庫連携不要`);
        } else if (p.status !== 'Amazon出品済') {
          invalidProducts.push(`${p.product_name || p.asin}: Amazon出品済みになっておりません（現在: ${p.status || '不明'}）`);
        } else {
          fbmListedIds.push(id);
        }
      }

      if (invalidProducts.length > 0 && fbmListedIds.length === 0) {
        alert('対象の商品がありません:\n\n' + invalidProducts.join('\n'));
        return;
      }
      if (invalidProducts.length > 0) {
        if (!confirm(`${invalidProducts.length}件はスキップされます:\n\n${invalidProducts.join('\n')}\n\n残り${fbmListedIds.length}件のCSVを出力しますか？`)) return;
      }

      try {
        const params = new URLSearchParams();
        params.set('ids', fbmListedIds.join(','));
        const res = await fetch(`./api/products/csv/ne-stock?${params}`);
        if (!res.ok) {
          const err = await res.json();
          alert(err.error || 'CSV出力エラー');
          return;
        }

        const blob = await res.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = res.headers.get('Content-Disposition')?.match(/filename="(.+)"/)?.[1] || 'ne_stock.csv';
        a.click();
        URL.revokeObjectURL(a.href);

        // ステータスをNE在庫連携済に変更
        if (confirm(`${fbmListedIds.length}件のステータスを「NE在庫連携済」に変更しますか？`)) {
          await Promise.all(fbmListedIds.map(id =>
            fetch(`./api/products/${id}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ status: 'NE在庫連携済' }),
            })
          ));
          showToast(`${fbmListedIds.length}件を「NE在庫連携済」に変更しました`);
          loadData();
        }
      } catch (e) { alert('通信エラー: ' + e.message); }
    }

    function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function showToast(m) { const e = document.getElementById('toast'); e.textContent = m; e.style.display = 'block'; setTimeout(() => e.style.display = 'none', 3000); }
  </script>
</body>
